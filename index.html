<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oppos Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #e4e09a;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 0;
    }

    h1 {
      text-align: center;
      margin-top: 20px;
    }

    #game-container {
      display: flex;
      flex-direction: row;
      gap: 20px;
      margin-top: 20px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 1200px;
    }

    .deck {
      border: 2px solid #004870;
      border-radius: 10px;
      padding: 10px;
      background-color: #bdf6e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 250px;
      max-width: 300px;
    }

    .deck h2 {
      margin: 0 0 10px 0;
      color: #004870;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
      gap: 8px;
      justify-items: center;
    }

    .card {
      width: 60px;
      height: 90px;
      border: 2px solid #004870;
      border-radius: 5px;
      background-color: #50d3df;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      user-select: none;
      font-weight: bold;
      color: #004870;
      transition: transform 0.2s, background-color 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card.incorrect {
      background-color: #ff6b6b !important;
      animation: flash 0.5s;
    }

    @keyframes flash {
      0% { background-color: #ff6b6b; }
      50% { background-color: #50d3df; }
      100% { background-color: #ff6b6b; }
    }

    #reaction-chain {
      margin-top: 20px;
      font-size: 18px;
      color: #004870;
    }
  </style>
</head>
<body>
  <h1>Oppos Game</h1>

  <div id="game-container">
    <div class="deck" id="player1-deck">
      <h2>Player 1</h2>
      <div class="cards-grid"></div>
    </div>
    <div class="deck" id="player2-deck">
      <h2>Player 2</h2>
      <div class="cards-grid"></div>
    </div>
  </div>

  <div id="reaction-chain">Next required card: ANY</div>

  <script>
    // Sample decks (replace with images/words later)
    const deck1 = ['big','dirty','easy','fast','full','happy','hard','hot','light','loud','old','open','tall','thick'];
    const deck2 = ['small','clean','difficult','slow','empty','sad','soft','cold','heavy','quiet','new','closed','short','thin'];

    let currentPlayer = 1;
    let chainRequired = null; // null means ANY card allowed

    const player1Grid = document.querySelector('#player1-deck .cards-grid');
    const player2Grid = document.querySelector('#player2-deck .cards-grid');
    const reactionChainEl = document.getElementById('reaction-chain');

    function renderDeck(deck, grid, player) {
      grid.innerHTML = '';
      deck.forEach((card, index) => {
        const cardEl = document.createElement('div');
        cardEl.classList.add('card');
        cardEl.textContent = card;
        cardEl.dataset.player = player;
        cardEl.dataset.index = index;
        cardEl.addEventListener('click', playCard);
        grid.appendChild(cardEl);
      });
    }

    function playCard(e) {
      const cardEl = e.currentTarget;
      const player = parseInt(cardEl.dataset.player);
      const index = parseInt(cardEl.dataset.index);

      if (player !== currentPlayer) {
        cardEl.classList.add('incorrect');
        setTimeout(() => cardEl.classList.remove('incorrect'), 500);
        return;
      }

      const playerDeck = player === 1 ? deck1 : deck2;

      // Enforce reaction chain if it exists
      if (chainRequired && cardEl.textContent !== chainRequired) {
        cardEl.classList.add('incorrect');
        setTimeout(() => cardEl.classList.remove('incorrect'), 500);
        return;
      }

      // Remove card from deck
      playerDeck.splice(index, 1);

      // Update chain: next chainRequired can be set here
      // For simplicity, alternating: next card same as previous (could be expanded)
      chainRequired = null; // Example: reset chain, can customize

      // Update display
      renderDeck(deck1, player1Grid, 1);
      renderDeck(deck2, player2Grid, 2);

      // Switch player
      currentPlayer = currentPlayer === 1 ? 2 : 1;
      reactionChainEl.textContent = 'Next required card: ' + (chainRequired || 'ANY');
    }

    // Initial render
    renderDeck(deck1, player1Grid, 1);
    renderDeck(deck2, player2Grid, 2);
  </script>
</body>
</html>
