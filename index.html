<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Have / Who Has – Online</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

#app{
width:950px;
background:#1e293b;
padding:22px;
border-radius:12px;
box-shadow:0 10px 40px rgba(0,0,0,.5);
}

h1{margin-top:0}

input,button{
padding:8px;
border-radius:6px;
border:none;
margin:6px 0;
}

button{
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{background:#1d4ed8}

#teacherPanel,#studentPanel,#gamePanel{display:none}

#grid{
margin-top:20px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.cardPile{
background:#020617;
border-radius:8px;
padding:14px;
text-align:center;
cursor:pointer;
border:2px solid transparent;
}

.cardPile.target{
border-color:#22c55e;
box-shadow:0 0 10px #22c55e;
}

.cardPile.disabled{
opacity:0.35;
cursor:not-allowed;
}

.count{
font-size:12px;
color:#94a3b8;
}

#chain{
margin-top:18px;
padding:12px;
background:#020617;
border-radius:8px;
font-size:20px;
text-align:center;
}

#log{
margin-top:15px;
height:120px;
overflow:auto;
background:#020617;
padding:10px;
border-radius:6px;
font-size:12px;
}

</style>
</head>

<body>

<div id="app">

<h1>I Have / Who Has</h1>

<div id="home">
<button id="teacherBtn">Teacher Host Game</button>
</div>

<div id="teacherPanel">
<h2>Teacher Panel</h2>
Room Name<br>
<input id="roomInput" placeholder="class1">
<br>
<button id="createRoomBtn">Create Room</button>
<button id="startGameBtn">Start Game</button>
<div id="studentLink"></div>
</div>

<div id="studentPanel">
<h2>Join Game</h2>
Name<br>
<input id="studentName" placeholder="name">
<br>
<button id="joinBtn">Join</button>
</div>

<div id="gamePanel">
<div id="chain">Waiting...</div>
<div id="grid"></div>
<div id="log"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyCZ4aNmk7xmpRnSe3ZOhOpkgGiCxQxKqSE",
authDomain:"i-have-d5728.firebaseapp.com",
databaseURL:"https://i-have-d5728-default-rtdb.firebaseio.com",
projectId:"i-have-d5728",
storageBucket:"i-have-d5728.firebasestorage.app",
messagingSenderId:"1041491068804",
appId:"1:1041491068804:web:21b0d472c5f2929d04bfd1"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const animals=["alligator","elephant","snake","lion","dog","cat","horse","monkey"];

let roomId=null;
let role="teacher";
let playerId="p"+Math.floor(Math.random()*999999);

let myCards=[];
let cardsDealt=false;

let currentTarget=null;
let chainBroken=false;

const home=document.getElementById("home");
const teacherPanel=document.getElementById("teacherPanel");
const studentPanel=document.getElementById("studentPanel");
const gamePanel=document.getElementById("gamePanel");

const grid=document.getElementById("grid");
const chainEl=document.getElementById("chain");
const logEl=document.getElementById("log");

function log(t){
const d=document.createElement("div");
d.textContent=t;
logEl.appendChild(d);
logEl.scrollTop=logEl.scrollHeight;
}

function shuffle(a){
for(let i=a.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
return a;
}

function generateDeck(){
let deck=[];
for(let i=0;i<animals.length;i++){
const have=animals[i];
const who=animals[(i+1)%animals.length];
for(let c=0;c<3;c++) deck.push({have,who});
}
return shuffle(deck);
}

function buildGrid(){

const groups={};

myCards.forEach(c=>{
if(!groups[c.have]) groups[c.have]=[];
groups[c.have].push(c);
});

grid.innerHTML="";

animals.forEach(a=>{

const pile=groups[a]||[];

const div=document.createElement("div");
div.className="cardPile";

if(currentTarget===a && !chainBroken) div.classList.add("target");

if(!chainBroken && currentTarget && a!==currentTarget) div.classList.add("disabled");


div.innerHTML=`<b>${a}</b><div class="count">${pile.length}</div>`;

if(pile.length>0) div.onclick=()=>attemptPlay(a);

grid.appendChild(div);

});

}

async function createRoom(){

roomId=document.getElementById("roomInput").value||"room"+Math.floor(Math.random()*999);

await set(ref(db,"rooms/"+roomId),{
state:"waiting",
gameStarted:false,
teacher:playerId,
played:[]
});

const link=location.origin+location.pathname+"?room="+roomId;

document.getElementById("studentLink").innerHTML="Student link:<br>"+link;

listenRoom();

}

async function joinStudent(){

roomId=new URLSearchParams(location.search).get("room");
role="student";

await update(ref(db,"rooms/"+roomId+"/players"),{
[playerId]:{name:document.getElementById("studentName").value}
});

studentPanel.style.display="none";

gamePanel.style.display="block";

listenRoom();

}

async function startGame(){

const deck=generateDeck();

await update(ref(db,"rooms/"+roomId),{
state:"playing",
gameStarted:true,
deck:deck,
played:[],
chain:null,
winner:null
});

}

function computeRemaining(data){

const counts={};
animals.forEach(a=>counts[a]=3);

if(data.played){

for(const c of data.played){
counts[c.have]--;
}

}

return counts;

}

function listenRoom(){

onValue(ref(db,"rooms/"+roomId),snap=>{

const data=snap.val();
if(!data) return;

if(data.state==="playing" && data.gameStarted && !cardsDealt){

const deck=data.deck;

if(role==="teacher") myCards=deck.slice(0,12);
else myCards=deck.slice(12);

cardsDealt=true;

buildGrid();

gamePanel.style.display="block";

}

if(data.chain){

chainEl.textContent=
"I HAVE "+data.chain.have.toUpperCase()+" — WHO HAS "+data.chain.who.toUpperCase();

currentTarget=data.chain.who;

const remaining=computeRemaining(data);

chainBroken = remaining[currentTarget] <= 0;

buildGrid();

}

if(data.winner){
chainEl.textContent=data.winner.toUpperCase()+" WINS!";
}

});

}

async function attemptPlay(animal){

if(!chainBroken && currentTarget && animal!==currentTarget) return;

const card=myCards.find(c=>c.have===animal);
if(!card) return;

const roomRef=ref(db,"rooms/"+roomId);

onValue(roomRef, async snap=>{

const data=snap.val();
if(!data) return;

const played=data.played||[];
played.push(card);

await update(roomRef,{chain:card,played:played});

},{onlyOnce:true});

myCards=myCards.filter(c=>c!==card);

buildGrid();

if(myCards.length===0){

await update(ref(db,"rooms/"+roomId),{
winner:role
});

}

}

if(new URLSearchParams(location.search).get("room")){
home.style.display="none";
studentPanel.style.display="block";
}
else{
home.style.display="block";
}

document.getElementById("teacherBtn").onclick=()=>{
home.style.display="none";
teacherPanel.style.display="block";
};

document.getElementById("createRoomBtn").onclick=createRoom;
document.getElementById("joinBtn").onclick=joinStudent;
document.getElementById("startGameBtn").onclick=startGame;

</script>

</body>
</html>
