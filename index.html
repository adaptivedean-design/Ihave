<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Have / Who Has</title>
<style>
body{margin:0;font-family:system-ui;background:radial-gradient(circle at 50% 18%, #174c63 0%, #0f3043 42%, #0f172a 100%);color:#004870;display:flex;justify-content:center;align-items:center;min-height:100vh;}
#app{width:min(1240px, calc(100vw - 40px));background:linear-gradient(180deg,#dafbe9 0%,#c4f7e5 100%);padding:20px;border-radius:12px;box-shadow:0 18px 55px rgba(0,0,0,.42);position:relative;}
#logo{width:180px;height:180px;object-fit:contain;background:white;border-radius:50%;padding:20px;box-shadow:0 8px 24px rgba(0,72,112,0.3);margin:0 auto;display:block;transition:all 0.3s;image-rendering:auto;image-rendering:-webkit-optimize-contrast;backface-visibility:hidden;}
body.in-game #logo{width:80px;height:80px;padding:10px;position:fixed;left:20px;top:25px;z-index:100;margin:0;transform:none;}
body.in-game h1{display:none;}
#gameSidebar{position:fixed;left:20px;top:144px;display:none;flex-direction:column;gap:15px;align-items:center;z-index:100;}
body.in-game #gameSidebar{display:flex;}
#gameSidebar #scoreBoard{position:static;transform:none;background:rgba(255,255,255,0.95);padding:8px 12px;border-radius:8px;border:2px solid #16b7a7;font-size:12px;color:#004870;width:110px;text-align:left;}
#gameSidebar #scoreBoard > div{display:flex;justify-content:space-between;align-items:center;margin:3px 0;}
#gameSidebar #scoreBoard b{color:#23879f;}
#gameSidebar #restartBtn{position:static;width:40px;height:40px;border-radius:50%;background:#23879f;border:2px solid #16b7a7;cursor:pointer;font-size:24px;line-height:1;padding:0;display:flex;align-items:center;justify-content:center;color:white;font-family:Arial, Helvetica, sans-serif;}
#gameSidebar #restartBtn:hover{background:#16b7a7;transform:rotate(180deg);transition:all 0.3s;}
#home{text-align:center;max-width:400px;margin:0 auto;}
#home input{width:100%;max-width:300px;margin:10px auto;display:block;}
#home button{width:100%;max-width:300px;margin:10px auto;display:block;}
#loginStatus{min-height:20px;margin-top:8px;font-size:13px;font-weight:650;color:#23879f;}
#lobby{text-align:center;}
h1{margin:20px 0 30px 0;color:#004870;text-align:center;font-size:28px;font-weight:700;}
#headerBar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding:0 20px;}
#headerBar > div{flex:1;display:flex;align-items:center;gap:15px;}
input,button{padding:8px;border-radius:6px;border:none;margin:6px 0;}
button{background:#23879f;color:white;cursor:pointer;font-weight:600;}
button:hover{background:#16b7a7;}
#lobby,#game{display:none}
#game{position:relative;}
#players{font-size:14px;margin-top:10px;color:#004870;}
#board{display:grid;grid-template-rows:200px 170px 1fr;height:650px;background:linear-gradient(180deg,rgba(239,248,215,.26),rgba(196,247,229,.86));border-radius:12px;padding:10px;box-shadow:inset 0 0 0 1px rgba(0,72,112,.08),inset 0 18px 38px rgba(255,255,255,.18);}
#opponentArea{display:flex;flex-direction:column;justify-content:flex-end;align-items:center;position:relative;padding:10px 0;}
#opponentPiles{width:90%;display:flex;flex-direction:column-reverse;gap:15px;align-items:center;} /* column-reverse so bottom pile appears at top visually */
#opponentPilesTop{display:flex;gap:8px;width:100%;justify-content:space-between;}
#opponentPilesBottom{display:flex;justify-content:center;width:100%;}
.opponentCard{background:#bdf6e0;height:45px;border-radius:6px;opacity:.95;border:2px solid #16b7a7;}
#centerArea{display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative;background:transparent;}
#centerArea.battleImpact::after{content:"";position:absolute;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle, rgba(255,107,107,.75), rgba(228,224,154,.45) 34%, rgba(110,227,222,.28) 52%, transparent 72%);opacity:0;pointer-events:none;animation:battleImpactFlash 1.5s ease-out;}
body.battleShake #board{animation:battleScreenShake 1.5s ease-in-out;}
#deck{background:transparent;width:190px;height:190px;border-radius:0;display:flex;justify-content:center;align-items:center;text-align:center;padding:0;cursor:pointer;transition:transform .08s;position:relative;perspective:1000px;box-shadow:none;border:none;isolation:isolate;}
#deck::after{content:"";position:absolute;inset:2px;border-radius:50%;border:4px solid rgba(255,107,107,0);box-shadow:0 0 0 rgba(255,107,107,0);pointer-events:none;z-index:8;transform:scale(.94);opacity:0;}
#deck.rejecting::after{animation:deckRejectRing .58s ease-out;}
#deck:hover{transform:scale(1.02);}
#chainText{display:none;}
#scoreBoard{position:absolute;top:20px;right:20px;background:rgba(0,72,112,0.8);padding:12px 16px;border-radius:8px;font-size:14px;border:2px solid #16b7a7;line-height:1.6;}
#restartBtn{position:absolute;top:20px;left:20px;}
#playerArea{display:flex;flex-direction:column;justify-content:flex-start;align-items:center;position:relative;padding:10px 0;}
#playerPiles{width:100%;height:100%;display:flex;flex-direction:column;position:relative;}
#playerPilesTop{display:flex;gap:0;justify-content:center;width:100%;margin:0 auto;position:relative;height:230px;transform:translateY(-28px);} /* Bottom half of ellipse - 8 piles */
#playerPilesTop .pile:nth-child(1){transform:translateX(-540px) translateY(0px);}
#playerPilesTop .pile:nth-child(2){transform:translateX(-386px) translateY(42px);}
#playerPilesTop .pile:nth-child(3){transform:translateX(-232px) translateY(76px);}
#playerPilesTop .pile:nth-child(4){transform:translateX(-78px) translateY(96px);}
#playerPilesTop .pile:nth-child(5){transform:translateX(78px) translateY(96px);}
#playerPilesTop .pile:nth-child(6){transform:translateX(232px) translateY(76px);}
#playerPilesTop .pile:nth-child(7){transform:translateX(386px) translateY(42px);}
#playerPilesTop .pile:nth-child(8){transform:translateX(540px) translateY(0px);}
#playerPilesBottom{display:flex;justify-content:center;align-items:center;flex:1;} /* Unorganized cluster area */
#opponentPiles{width:100%;height:100%;display:flex;flex-direction:column;position:relative;}
#opponentPilesTop{display:flex;gap:0;justify-content:center;width:100%;margin:0 auto;position:relative;height:190px;transform:translateY(118px);} /* Top half of ellipse - 8 piles */
#opponentPilesTop .pile:nth-child(1){transform:translateX(500px) translateY(0px);}
#opponentPilesTop .pile:nth-child(2){transform:translateX(356px) translateY(-26px);}
#opponentPilesTop .pile:nth-child(3){transform:translateX(212px) translateY(-48px);}
#opponentPilesTop .pile:nth-child(4){transform:translateX(70px) translateY(-62px);}
#opponentPilesTop .pile:nth-child(5){transform:translateX(-70px) translateY(-62px);}
#opponentPilesTop .pile:nth-child(6){transform:translateX(-212px) translateY(-48px);}
#opponentPilesTop .pile:nth-child(7){transform:translateX(-356px) translateY(-26px);}
#opponentPilesTop .pile:nth-child(8){transform:translateX(-500px) translateY(0px);}
#opponentPilesBottom{display:none;} /* HIDDEN - opponent's unorganized cards not visible */
.pile{width:144px;height:198px;min-height:198px;border:none;border-radius:8px;background:transparent;box-shadow:none;transition:background 0.12s,box-shadow 0.12s;padding:6px;display:flex;flex-direction:column;align-items:center;position:absolute;} /* Organizing piles - full size, positioned absolutely for arc */
#opponentPilesTop .pile{width:106px;height:150px;min-height:150px;}
.pile.communal{width:auto;min-width:350px;min-height:180px;border:none;background:transparent;box-shadow:none;padding:16px;display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:0;position:relative;} /* Unorganized cluster - no border */
.pile.dragOver{background:rgba(110,227,222,0.24);box-shadow:inset 0 0 0 2px #6ee3de,0 0 18px rgba(110,227,222,0.35);}
#playerPilesTop .pile::after{content:"";position:absolute;left:18px;right:18px;bottom:9px;height:3px;border-radius:999px;background:linear-gradient(90deg, transparent, rgba(35,135,159,0.72), rgba(110,227,222,0.92), rgba(35,135,159,0.72), transparent);box-shadow:0 0 10px rgba(110,227,222,0.45);animation:dropRailPulse 1.8s ease-in-out infinite;pointer-events:none;}
#playerPilesTop .pile.dragOver::after{height:5px;background:linear-gradient(90deg, transparent, #e4e09a, #6ee3de, #e4e09a, transparent);box-shadow:0 0 16px rgba(110,227,222,0.85);}
/* Cards in organizing piles - vertical stack */
.pile:not(.communal) .cardInPile{margin-left:0;margin-top:-102px;}
#opponentPilesTop .pile:not(.communal) .cardInPile{margin-top:-74px;}
.pile:not(.communal) .cardInPile:first-child{margin-top:0;}
/* Cards in communal cluster - slight random overlap for messy look */
.pile.communal .cardInPile{margin:-64px;position:relative;}
.pile.communal .cardInPile:first-child{margin:0;}
/* General card styles */
.cardInPile{position:relative;cursor:grab;touch-action:manipulation;user-select:none;-webkit-user-drag:element;}
.cardInPile.dragging{opacity:0.5;cursor:grabbing;}
.cardInPile:hover{z-index:10;} /* Keep hover crisp; glow lives on the image */
.playerCard{border-radius:8px;cursor:pointer;transition:transform .04s,box-shadow .06s;border:none;display:block;object-fit:contain;image-rendering:auto;image-rendering:-webkit-optimize-contrast;backface-visibility:hidden;} /* No borders - images stand alone */
.pile .playerCard{width:142px !important;height:142px !important;}
#opponentPilesTop .pile .playerCard{width:104px !important;height:104px !important;}
.playerCard:hover{transform:translateY(-2px);box-shadow:0 0 18px rgba(35,135,159,0.54),0 8px 18px rgba(0,72,112,.16);} /* Glow effect instead of border */
.playerCard.pendingPlay{filter:brightness(1.08);}
.playerCard.wrong,.playerCard.wrongCard{animation:shake 0.4s,flashRed 0.4s;box-shadow:0 0 20px rgba(255,107,107,0.9) !important;} /* Red glow for wrong card */
.cardFlyClone{position:fixed;z-index:930;pointer-events:none;object-fit:contain;border-radius:8px;background:transparent !important;border:none !important;box-shadow:none !important;filter:none !important;will-change:transform,opacity;transition:transform .76s cubic-bezier(.18,.88,.2,1);}
.cardFlyClone.blockedClone{filter:drop-shadow(0 0 16px rgba(255,107,107,0.85)) !important;}
.centerCardSurface{position:absolute;inset:0;z-index:3;width:100%;height:100%;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:1;transition:opacity .18s ease,transform .18s ease;}
.centerCardSurface img{display:block;width:172px;height:172px;object-fit:contain;image-rendering:auto;image-rendering:-webkit-optimize-contrast;}
.centerCardSurface.covering{transform:scale(1.22);}
.centerCardSurface.settling{animation:centerSurfaceSettle .32s cubic-bezier(.18,.88,.2,1) forwards;}
.centerCardSurface.decaying{opacity:0;transform:scale(.96);}
.centerCardSurface.locking{animation:centerLockPulse .34s ease-out;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
@keyframes dropRailPulse{0%,100%{opacity:.38;transform:scaleX(.82);}50%{opacity:.95;transform:scaleX(1);}}
@keyframes chainBreakPulse{0%,100%{background:rgba(228,224,154,0.3);}50%{background:rgba(228,224,154,0.7);}} /* Pulse yellow */
@keyframes centerLockPulse{0%{transform:scale(1);filter:drop-shadow(0 0 0 rgba(110,227,222,0));}42%{transform:scale(1.08);filter:drop-shadow(0 0 22px rgba(110,227,222,.75));}100%{transform:scale(1);filter:drop-shadow(0 0 4px rgba(110,227,222,.15));}}
@keyframes centerSurfaceSettle{0%{transform:scale(1.22);filter:drop-shadow(0 0 18px rgba(110,227,222,.38));}55%{transform:scale(1.06);filter:drop-shadow(0 0 24px rgba(110,227,222,.52));}100%{transform:scale(1);filter:drop-shadow(0 0 4px rgba(110,227,222,.15));}}
@keyframes battleImpactFlash{0%,100%{opacity:0;transform:scale(.74);}18%{opacity:.95;transform:scale(1);}32%{opacity:.18;transform:scale(.9);}48%{opacity:.9;transform:scale(1.08);}62%{opacity:.2;transform:scale(.94);}76%{opacity:.88;transform:scale(1.16);}90%{opacity:.24;transform:scale(1.04);}}
@keyframes battleScreenShake{0%,100%{transform:translate(0,0) rotate(0deg);}16%{transform:translate(-8px,3px) rotate(-.45deg);}24%{transform:translate(6px,-2px) rotate(.34deg);}44%{transform:translate(8px,-3px) rotate(.42deg);}52%{transform:translate(-6px,2px) rotate(-.32deg);}72%{transform:translate(-7px,2px) rotate(-.36deg);}80%{transform:translate(5px,-1px) rotate(.25deg);}92%{transform:translate(-2px,1px) rotate(-.1deg);}}
@keyframes deckRejectRing{0%{opacity:0;transform:scale(.86);border-color:rgba(255,107,107,0);box-shadow:0 0 0 rgba(255,107,107,0);}18%{opacity:1;transform:scale(1.03);border-color:rgba(255,107,107,.95);box-shadow:0 0 26px rgba(255,107,107,.78),inset 0 0 22px rgba(255,107,107,.46);}42%{opacity:.46;transform:scale(.96);border-color:rgba(255,107,107,.55);box-shadow:0 0 12px rgba(255,107,107,.38),inset 0 0 10px rgba(255,107,107,.24);}68%{opacity:1;transform:scale(1.08);border-color:rgba(255,107,107,.92);box-shadow:0 0 32px rgba(255,107,107,.7),inset 0 0 24px rgba(255,107,107,.42);}100%{opacity:0;transform:scale(1.18);border-color:rgba(255,107,107,0);box-shadow:0 0 0 rgba(255,107,107,0);}}
.chainBroken{animation:chainBreakPulse 1s infinite;}
.cardInPile.chainBroken{box-shadow:0 0 18px rgba(228,224,154,0.9),0 0 0 2px rgba(228,224,154,0.62);border-radius:8px;}
@keyframes flashRed{0%,100%{background:linear-gradient(135deg, #004870, #023047);}50%{background:#8b0000;border-color:#ff0000;}}
.deckInner{position:relative;width:100%;height:100%;transition:transform 0.6s;transform-style:preserve-3d;z-index:1;}
#deck.instantFaceReset .deckInner{transition:none !important;}
#deck.centerReplacing .deckInner{opacity:0;transition:opacity .22s,transform 0.6s;}
#deck.flipped .deckInner{transform:rotateY(180deg);}
.deckFront,.deckBack{position:absolute;width:100%;height:100%;backface-visibility:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;font-size:14px;padding:8px;overflow:hidden;}
.deckFront img,.deckBack img{display:block;width:172px;height:172px;max-width:none;max-height:none;object-fit:contain;image-rendering:auto;image-rendering:-webkit-optimize-contrast;backface-visibility:hidden;}
.deckBack{transform:rotateY(180deg);}

/* Card Arrangement Overlay - appears at game start */
#cardOverlay{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  width:min(820px, calc(100vw - 48px));
  min-height:196px;
  background:rgba(218,251,233,0.96);
  z-index:200;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:10px 18px 12px 18px;
  border-radius:16px;
  transform:translate(-50%, calc(-58% - 76px));
  box-shadow:0 14px 44px rgba(0,72,112,0.26);
  border:2px solid rgba(22,183,167,.72);
}
#cardOverlay.visible{display:flex;}
#overlayTitle{
  font-size:16px;
  font-weight:700;
  color:#004870;
  margin-bottom:2px;
  text-align:center;
}
#overlaySubtitle{
  font-size:12px;
  color:#23879f;
  margin-bottom:4px;
  text-align:center;
}
#overlayCards{
  display:flex;
  flex-wrap:nowrap;
  gap:12px;
  justify-content:center;
  align-items:center;
  width:100%;
  overflow:hidden;
  padding:4px 8px 2px 8px;
}
#overlayCards .playerCard{
  width:142px;
  height:142px;
  cursor:grab;
}
#overlayCards .playerCard:hover{
  box-shadow:0 0 16px rgba(35,135,159,0.42);
}
#readyPanel{
  display:none;
  position:fixed;
  left:50%;
  top:50%;
  transform:translate(-50%, 46px);
  z-index:260;
  align-items:center;
  gap:12px;
  padding:10px 14px;
  border-radius:14px;
  background:rgba(0,72,112,.92);
  border:1px solid rgba(110,227,222,.42);
  box-shadow:0 14px 42px rgba(0,72,112,.34);
  color:#dafbe9;
}
#readyStatus{font-size:14px;font-weight:650;color:#eff8d7;white-space:nowrap;}
#readyBtn{
  margin:0;
  padding:10px 18px;
  border-radius:999px;
  background:#16b7a7;
  color:white;
  border:2px solid rgba(218,251,233,.72);
  box-shadow:0 0 18px rgba(110,227,222,.35);
}
#readyBtn:disabled{cursor:not-allowed;opacity:.58;background:#23879f;box-shadow:none;}
#countdownOverlay{
  display:none;
  position:fixed;
  inset:0;
  z-index:950;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  background:radial-gradient(circle at center, rgba(110,227,222,.18), rgba(0,72,112,.12) 34%, transparent 58%);
}
#countdownText{
  min-width:180px;
  text-align:center;
  font-size:96px;
  font-weight:950;
  color:#eff8d7;
  text-shadow:0 0 26px rgba(0,72,112,.78),0 0 38px rgba(110,227,222,.72);
  transform:scale(1);
  animation:countdownPop .95s ease-out infinite;
}
@keyframes countdownPop{0%{opacity:.15;transform:scale(.72);}22%{opacity:1;transform:scale(1.04);}100%{opacity:.88;transform:scale(1);}}
#roundWinnerOverlay{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%, -50%);min-width:340px;max-width:min(560px, calc(100vw - 48px));padding:42px 52px;border-radius:18px;z-index:10000;text-align:center;overflow:hidden;background:linear-gradient(145deg, rgba(0,72,112,.98), rgba(35,135,159,.96));box-shadow:0 24px 70px rgba(0,72,112,.42),0 0 0 1px rgba(218,251,233,.42) inset;}
#roundWinnerOverlay::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 20% 15%, rgba(228,224,154,.32), transparent 34%),radial-gradient(circle at 82% 20%, rgba(110,227,222,.36), transparent 30%);pointer-events:none;}
#roundWinnerOverlay.win{background:linear-gradient(145deg, #23879f, #16b7a7);}
#roundWinnerOverlay.loss{background:linear-gradient(145deg, #004870, #235a72);}
#roundWinnerText{position:relative;font-size:46px;font-weight:900;color:white;margin-bottom:14px;letter-spacing:0;text-shadow:0 5px 18px rgba(0,72,112,.35);}
#roundWinnerSubtext{position:relative;font-size:20px;font-weight:650;color:#dafbe9;line-height:1.35;}

/* Battle UI polish */
#battleScreen{
  top:50% !important;
  left:50% !important;
  width:min(920px, calc(100vw - 56px)) !important;
  height:min(720px, calc(100vh - 64px)) !important;
  transform:translate(-50%, -50%) scale(.98);
  border-radius:24px;
  background:radial-gradient(circle at 50% 42%, rgba(228,224,154,.18), transparent 18%),linear-gradient(145deg, rgba(0,40,62,.98), rgba(0,72,112,.98) 44%, rgba(35,135,159,.96)) !important;
  padding:24px 0 !important;
  box-shadow:0 28px 90px rgba(0,0,0,.46),0 0 0 1px rgba(218,251,233,.24);
  opacity:0;
  transition:opacity .22s ease,transform .22s ease;
}
#battleScreen::after{content:"";position:fixed;inset:calc((100vh - min(720px, calc(100vh - 64px))) / -2) calc((100vw - min(920px, calc(100vw - 56px))) / -2);z-index:-2;background:rgba(0,24,38,.46);backdrop-filter:blur(2px);pointer-events:none;}
#battleScreen.visible{opacity:1;transform:translate(-50%, -50%) scale(1);}
#battleScreen::before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:linear-gradient(120deg, transparent 0 47%, rgba(110,227,222,.42) 47.2% 47.5%, transparent 47.8%),linear-gradient(38deg, transparent 0 58%, rgba(228,224,154,.34) 58.2% 58.5%, transparent 58.8%);
  opacity:.35;
}
#battleBackdrop{
  position:absolute;
  inset:0;
  pointer-events:none;
  background:radial-gradient(circle at 50% 50%, rgba(110,227,222,.22), transparent 24%);
  transform:scale(.95);
  opacity:.65;
  transition:transform .08s,opacity .08s;
}
#battleScreen.battlePress #battleBackdrop{transform:scale(1.04);opacity:1;}
#battleText{
  position:relative;
  z-index:2;
  font-size:58px !important;
  color:#eff8d7 !important;
  letter-spacing:0 !important;
  text-shadow:0 0 24px rgba(228,224,154,.78),0 10px 28px rgba(0,0,0,.25) !important;
}
#battlePanel{
  position:relative;
  z-index:2;
  width:min(680px, calc(100vw - 92px)) !important;
  padding:18px 24px 22px 24px;
  border-radius:18px;
  border:1px solid rgba(218,251,233,.28);
  background:rgba(0,72,112,.42);
  box-shadow:0 22px 70px rgba(0,0,0,.3),inset 0 0 0 1px rgba(255,255,255,.06);
  backdrop-filter:blur(12px);
}
#battleTimer{
  width:78px;
  height:78px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto;
  border-radius:50%;
  background:linear-gradient(145deg, rgba(239,248,215,.95), rgba(110,227,222,.72));
  color:#004870 !important;
  font-size:42px !important;
  box-shadow:0 0 26px rgba(110,227,222,.44),inset 0 0 0 2px rgba(255,255,255,.42);
  text-shadow:none !important;
}
#battleMatchup{padding:0 8px !important;}
#leftName,#rightName{
  min-height:42px;
  padding:8px 10px;
  border-radius:10px;
  background:rgba(218,251,233,.12);
  border:1px solid rgba(218,251,233,.18);
  font-size:22px !important;
  color:#eff8d7 !important;
  text-shadow:0 0 16px rgba(110,227,222,.34);
}
#battleScaleWrap{height:190px !important;}
#battleScaleWrap svg{filter:drop-shadow(0 20px 26px rgba(0,0,0,.24));}
#battleScaleWrap path{fill:#6ee3de;stroke:#eff8d7;}
#battleScaleWrap circle{fill:#004870;stroke:#e4e09a;}
#scaleBeam line{stroke:#eff8d7;stroke-width:8;}
#scaleBeam rect{rx:10;stroke:#eff8d7;stroke-width:2.5;}
#scaleBeam rect:first-of-type{fill:#6ee3de;}

function movementKey(card, playedBy){
return `${playedBy || "unknown"}:${card && card.id}`;

function cancelMovement(cardId, playedBy){
if(cardId === undefined || cardId === null) return;
const key = movementKey({id: cardId}, playedBy);
canceledMovementKeys.add(key);
const clone = activeMovementClones.get(key);
if(clone && clone.parentNode) clone.remove();
activeMovementClones.delete(key);
activeMovementKeys.delete(key);
if(String(centerRevealCardId) === String(cardId)){
centerRevealAt = 0;
centerRevealCardId = null;
}
}

function flashDeckRejectRing(delay=0){
if(!deck) return;
const timer = setTimeout(() => {
deckRejectTimers = deckRejectTimers.filter(activeTimer => activeTimer !== timer);
deck.classList.remove("rejecting");
void deck.offsetWidth;
deck.classList.add("rejecting");
const clearTimer = setTimeout(() => {
deckRejectTimers = deckRejectTimers.filter(activeTimer => activeTimer !== clearTimer);
deck.classList.remove("rejecting");
}, 620);
deckRejectTimers.push(clearTimer);
}, delay);
deckRejectTimers.push(timer);
}

const overlay = document.getElementById("cardOverlay");

overlayCards.innerHTML = "";

function renderHand(){
console.log("renderHand called, myHand:", myHand);

// Create piles if they don't exist
const playerPilesTop = document.getElementById("playerPilesTop");
if(playerPilesTop.children.length === 0){
createPiles();
}

const communalPile = document.querySelector('[data-pile-id="player-communal"]');
const handIds = new Set(myHand.map(card => String(card.id)));

// Remove only cards that left my hand. Preserve arranged piles after a play.
document.querySelectorAll('#playerPiles .playerCard.cardInPile, #overlayCards .playerCard.cardInPile').forEach(cardEl => {
if(!handIds.has(String(cardEl.dataset.cardId))){
cardEl.remove();
}
});

// Check if this is first render (game just started)
const existingCards = document.querySelectorAll('#playerPiles .playerCard.cardInPile, #overlayCards .playerCard.cardInPile');
const isFirstRender = myHand.length > 0 && existingCards.length === 0 && !winner;

if(isFirstRender){
// FIRST RENDER: Show cards in overlay
console.log("First render - showing overlay with cards");
refreshArrangementOverlay();
} else {
// NORMAL RENDER: Place cards in communal pile (or they're already organized)
myHand.forEach(card=>{
// Check if card is already in a pile (organized)
const existingCard = document.querySelector(`.cardInPile[data-card-id="${card.id}"]`);
if(existingCard) return; // Card already placed, skip

if(communalPile){
communalPile.appendChild(createPlayerCardImage(card, false));
}
});
refreshArrangementOverlay();
}

console.log("Cards rendered");
updateReadyPanel(latestRoomData);
}

async function renderOpponent(opponentHand){
const renderToken = ++opponentRenderToken;
// Clear existing cards from ALL opponent piles
const allOpponentCards = document.querySelectorAll('#opponentPiles .cardInPile');
allOpponentCards.forEach(card => card.remove());

if(!opponentHand || opponentHand.length === 0){
// Hide communal pile if no cards
const opponentCommunal = document.querySelector('[data-pile-id="opponent-communal"]');
if(opponentCommunal) opponentCommunal.style.display = 'none';
return;
}

// Get opponent's pile organization from Firebase
let pileOrganization = {};
try {
// Find opponent's player ID
let opponentId = null;
const playersSnap = await get(ref(db, `rooms/${roomId}/players`));
const players = playersSnap.val();
for(const pid in players){
if(pid !== playerId){
opponentId = pid;
break;
}
}

if(opponentId){
const orgSnap = await get(ref(db, `rooms/${roomId}/pileOrganization/${opponentId}`));
pileOrganization = orgSnap.val() || {};
}
} catch(e){
console.log("No pile organization for opponent yet");
}

if(renderToken !== opponentRenderToken) return;

// Create a map of cards by ID for easy lookup
const cardMap = {};
opponentHand.forEach(card => {
cardMap[card.id] = card;
});

// Track which cards have been placed
const placedCards = new Set();

// Place cards in their organized piles
for(const pileId in pileOrganization){
const cardIds = pileOrganization[pileId];
// Convert player pile IDs to opponent pile IDs
const opponentPileId = pileId.replace('player-', 'opponent-');
const pile = document.querySelector(`[data-pile-id="${opponentPileId}"]`);

if(pile){
cardIds.forEach(cardId => {
const card = cardMap[cardId];
if(card){
// Create image element that IS the card
const img = document.createElement("img");
img.src = CARD_IMAGES.ihave[card.iHave] || "";
img.alt = card.iHave;
img.className = "playerCard cardInPile";
img.dataset.cardId = card.id;

// Match square source artwork to avoid browser distortion.
img.style.width = "104px";
img.style.height = "104px";
img.style.objectFit = "contain";
img.style.cursor = "default";
img.style.opacity = "0.9";

pile.appendChild(img);
placedCards.add(String(cardId));
}
});
}
}

// Place remaining unorganized cards in communal pile
const opponentCommunal = document.querySelector('[data-pile-id="opponent-communal"]');
if(opponentCommunal){
opponentHand.forEach(card => {
if(!placedCards.has(String(card.id))){
// Create image element that IS the card
const img = document.createElement("img");
img.src = CARD_IMAGES.ihave[card.iHave] || "";
img.alt = card.iHave;
img.className = "playerCard cardInPile";
img.dataset.cardId = card.id;

// Match square source artwork to avoid browser distortion.
img.style.width = "104px";
img.style.height = "104px";
img.style.objectFit = "contain";
img.style.cursor = "default";
img.style.opacity = "0.9";

opponentCommunal.appendChild(img);
}
});

// Show/hide communal pile
const cardsInCommunal = opponentCommunal.querySelectorAll('.cardInPile');
opponentCommunal.style.display = cardsInCommunal.length > 0 ? 'flex' : 'none';
}
}

if(playValidationInProgress){
console.log("A card play is already being validated");
console.log("====== tryPlay END (validation in progress) ======");
return;
}
playValidationInProgress = true;

const roomData = latestRoomData || {};
if(roomData.state === "playing" && !roomData.winner && !isRoundPlayable(roomData)){
console.log("Cards are locked until both players are ready and the countdown finishes");
if(cardElement){
cardElement.classList.add('wrongCard');
setTimeout(() => cardElement.classList.remove('wrongCard'), 400);
}
console.log("====== tryPlay END (waiting for ready countdown) ======");
playValidationInProgress = false;
return;
}

const phaseBlocksLocalClick = [
FLOW_PHASES.ARRANGING,
FLOW_PHASES.COUNTDOWN,
FLOW_PHASES.BATTLE_INTRO,
FLOW_PHASES.BATTLE_ACTIVE
].includes(flowPhase);
if(phaseBlocksLocalClick){
console.log("Cards are not accepting plays in phase:", flowPhase);
if(cardElement){
animateBlockedCardToCenter(card, playerId, `local_phase_${flowPhase}`);
cardElement.classList.add('wrongCard');
setTimeout(() => cardElement.classList.remove('wrongCard'), 400);
}
console.log("====== tryPlay END (phase blocked) ======");
playValidationInProgress = false;
return;
}

// If chain exists and is flipped, check if this card matches
if(getTargetState(roomData) === "revealed"){
// Check if card matches the target
const matchesTarget = card.iHave === currentChain.whoHas;

if(!matchesTarget){
// Card doesn't match - check if chain is broken (no cards with target animal left)
const targetAnimal = currentChain.whoHas;

// Get all hands from Firebase to check if target animal still exists
let handsSnap = await get(ref(db,"rooms/"+roomId+"/hands"));
let allHands = handsSnap.val() || {};

let targetExists = false;
for(const playerId in allHands){
const hand = Object.values(allHands[playerId]);
if(hand.some(c => c.iHave === targetAnimal)){
targetExists = true;
break;
}
}

if(targetExists){
console.log("Card doesn't match chain and target still exists in play");

// NEGATIVE FEEDBACK: Shake and flash red
if(cardElement){
cardElement.classList.add('wrongCard');
setTimeout(() => cardElement.classList.remove('wrongCard'), 400);
}

console.log("====== tryPlay END (wrong card) ======");
playValidationInProgress = false;
return; // Wrong card, can't play
} else {
console.log("Chain broken! Target animal depleted, allowing any card to restart chain");
// Chain is broken - allow this card to restart the chain
// (Flash will happen after flip, not here)
}
}
}

// If chain exists but is not flipped, player must flip first
if(currentChain && !currentChain.flipped) {
console.log("Chain not flipped yet, must flip first");
if(cardElement){
animateBlockedCardToCenter(card, playerId, "local_must_flip");
cardElement.classList.add('wrongCard');
setTimeout(() => cardElement.classList.remove('wrongCard'), 400);
}
console.log("====== tryPlay END (must flip) ======");
playValidationInProgress = false;
return;
}

console.log("Card validated, proceeding to play...");
pendingCardId = card.id;
activePlayId = `${playerId}-${Date.now()}-${++playSequence}`;
playValidationInProgress = false;
if(cardElement){
cardElement.classList.add('pendingPlay');
}
const shouldOptimisticallyMove = !battleState && (!currentChain || currentChain.flipped);
setFlowPhase(FLOW_PHASES.CARD_MOVING);
if(shouldOptimisticallyMove){
localMovementStartedFor = animateCardToCenter(card, playerId) ? card.id : null;
} else {
localMovementStartedFor = null;
}

// Check if socket is connected
if(!socket || !socket.connected){
console.error("Socket not connected; falling back to immediate play");
clearPendingPlayVisuals();
playCardNow(card);
console.log("====== tryPlay END (socket fallback) ======");
return;
}

// Send card play to WebSocket server for battle detection
console.log("Sending card_played to server:", {roomId, playerId, card: card.iHave, isHost, activePlayId});
socket.emit('card_played', {
roomId: roomId,
playerId: playerId,
card: card,
isHost: isHost,
playId: activePlayId
});
schedulePendingPlayWatchdog(card, activePlayId);

console.log("card_played event sent, waiting for server response...");
console.log("====== tryPlay END (waiting for server) ======");
// Note: Server will either trigger battle_start or play_card_now
// Don't play the card here - wait for server response
}

function getAllRemainingCards(hands){
const allCards = [];
for(const pid in (hands || {})){
allCards.push(...Object.values(hands[pid] || {}));
}
return allCards;
}

async function shouldShowChainBreak(targetAnimal){
let roomSnap = await get(ref(db,"rooms/"+roomId));
let roomData = roomSnap.val() || {};

if(roomData.winner){
console.log("Round already has a winner; suppressing chain break pulse");
return false;
}

const allCards = getAllRemainingCards(roomData.hands);
if(allCards.length === 0){
console.log("No cards remain; suppressing chain break pulse");
return false;
}

if(allCards.some(c => c.iHave === targetAnimal)){
return false;
}

return true;
}

function setChainBrokenVisual(isBroken){
const playerArea = document.getElementById("playerArea");
const opponentArea = document.getElementById("opponentArea");
if(playerArea) playerArea.classList.remove("chainBroken");
if(opponentArea) opponentArea.classList.remove("chainBroken");
document.querySelectorAll('.cardInPile.chainBroken').forEach(card => card.classList.remove('chainBroken'));
if(!isBroken) return;
document.querySelectorAll('#playerPiles .cardInPile').forEach(card => card.classList.add('chainBroken'));
}

function findVisibleCardElement(cardId, playedBy){
if(cardId === undefined || cardId === null) return null;
const selector = `.cardInPile[data-card-id="${cardId}"]`;
const scope = playedBy === playerId ? document : document.getElementById("opponentPiles");
return scope ? scope.querySelector(selector) : null;
}

function getCenterCardScale(sourceRect){
const sourceSize = Math.max(sourceRect.width, sourceRect.height);
if(!sourceSize) return 1;
return Math.min(2.25, Math.max(0.72, CENTER_CARD_COVER_SIZE / sourceSize));
}

function animateCardToCenter(card, playedBy){
const key = movementKey(card, playedBy);
if(activeMovementKeys.has(key)) return true;
const source = findVisibleCardElement(card.id, playedBy);
const target = deck;
if(!source || !target){
console.warn("Cannot animate card to center; source or target missing", {
cardId: card && card.id,
playedBy,
hasSource: Boolean(source),
hasTarget: Boolean(target)
});
return false;
}

const deckFront=document.querySelector(".deckFront");
if(deckFront) deckFront.innerHTML = "";
centerRevealAt = Date.now() + CARD_TRAVEL_MS + 90;
centerRevealCardId = card.id;
if(currentChain && currentChain.flipped){
removeCenterSurface();
}

const sourceRect = source.getBoundingClientRect();
const targetRect = target.getBoundingClientRect();
if(!sourceRect.width || !sourceRect.height || !targetRect.width || !targetRect.height){
console.warn("Cannot animate card to center; zero-size source or target", {
cardId: card && card.id,
playedBy,
sourceRect,
targetRect
});
return false;
}
activeMovementKeys.add(key);

const clone = source.cloneNode(true);
clone.classList.add("cardFlyClone");
clone.classList.remove("pendingPlay", "wrong", "wrongCard", "dragging");
clone.dataset.cardId = card.id;
clone.dataset.playedBy = playedBy || "";
clone.style.left = `${sourceRect.left}px`;
clone.style.top = `${sourceRect.top}px`;
clone.style.width = `${sourceRect.width}px`;
clone.style.height = `${sourceRect.height}px`;
clone.style.margin = "0";
clone.style.opacity = "1";
clone.style.transform = "translate3d(0,0,0) scale(1)";
clone.style.background = "transparent";
clone.style.border = "none";
clone.style.boxShadow = "none";
clone.style.outline = "none";
clone.style.padding = "0";
clone.style.filter = "none";
document.body.appendChild(clone);
activeMovementClones.set(key, clone);

const dx = targetRect.left + targetRect.width / 2 - (sourceRect.left + sourceRect.width / 2);
const dy = targetRect.top + targetRect.height / 2 - (sourceRect.top + sourceRect.height / 2);
const coverScale = getCenterCardScale(sourceRect);

requestAnimationFrame(() => requestAnimationFrame(() => {
clone.style.transform = `translate3d(${dx}px, ${dy}px, 0) scale(${coverScale})`;
clone.style.opacity = "1";
}));

setTimeout(() => {
if(canceledMovementKeys.has(key)){
canceledMovementKeys.delete(key);
clone.remove();
activeMovementClones.delete(key);
} else if(flowPhase === FLOW_PHASES.BATTLE_INTRO || flowPhase === FLOW_PHASES.BATTLE_ACTIVE){
if(clone.dataset.battleClone !== "true"){
clone.remove();
activeMovementClones.delete(key);
}
} else {
const surface = document.createElement("div");
const surfaceImg = clone.cloneNode(false);
surface.className = "centerCardSurface covering";
surface.dataset.cardId = card.id;
surface.dataset.playedBy = playedBy || "";
surfaceImg.className = "";
surfaceImg.removeAttribute("style");
surfaceImg.src = CARD_IMAGES.ihave[card.iHave] || surfaceImg.src;
surfaceImg.alt = card.iHave;
removeCenterSurface();
surface.appendChild(surfaceImg);
deck.appendChild(surface);
const deckFront = document.querySelector(".deckFront");
const deckBack = document.querySelector(".deckBack");
if(deckFront) deckFront.innerHTML = "";
if(deckBack) deckBack.innerHTML = "";
deck.classList.add("instantFaceReset");
deck.classList.remove("flipped");
requestAnimationFrame(() => {
surface.classList.remove("covering");
surface.classList.add("settling");
});
setTimeout(() => surface.classList.remove("settling"), 360);
clone.remove();
activeMovementClones.delete(key);
}
activeMovementKeys.delete(key);
}, CARD_TRAVEL_MS + 80);
return true;
}

function animateBattleCardCollision(card, playedBy, durationMs){
const source = findVisibleCardElement(card.id, playedBy);
const target = deck;
if(!target) return;

const targetRect = target.getBoundingClientRect();
if(!targetRect.width || !targetRect.height) return;

const key = movementKey(card, playedBy);
let clone = activeMovementClones.get(key);
if(clone && !document.body.contains(clone)){
activeMovementClones.delete(key);
clone = null;
}

let sourceRect;
if(clone){
sourceRect = clone.getBoundingClientRect();
clone.getAnimations().forEach(animation => animation.cancel());
clone.style.transition = "none";
clone.style.left = `${sourceRect.left}px`;
clone.style.top = `${sourceRect.top}px`;
clone.style.width = `${sourceRect.width}px`;
clone.style.height = `${sourceRect.height}px`;
clone.style.transform = "translate3d(0,0,0) scale(1)";
clone.dataset.battleClone = "true";
} else {
if(!source) return;
sourceRect = source.getBoundingClientRect();
if(!sourceRect.width || !sourceRect.height) return;
clone = source.cloneNode(true);
clone.classList.add("cardFlyClone");
clone.classList.remove("pendingPlay", "wrong", "wrongCard", "dragging");
clone.dataset.cardId = card.id;
clone.dataset.playedBy = playedBy || "";
clone.dataset.battleClone = "true";
clone.style.left = `${sourceRect.left}px`;
clone.style.top = `${sourceRect.top}px`;
clone.style.width = `${sourceRect.width}px`;
clone.style.height = `${sourceRect.height}px`;
clone.style.margin = "0";
clone.style.opacity = "1";
clone.style.transform = "translate3d(0,0,0) scale(1)";
clone.style.background = "transparent";
clone.style.border = "none";
clone.style.boxShadow = "none";
clone.style.outline = "none";
clone.style.padding = "0";
document.body.appendChild(clone);
activeMovementClones.set(key, clone);
}

clone.classList.add("blockedClone");
clone.style.filter = "drop-shadow(0 0 18px rgba(255,107,107,.9))";

const dx = targetRect.left + targetRect.width / 2 - (sourceRect.left + sourceRect.width / 2);
const dy = targetRect.top + targetRect.height / 2 - (sourceRect.top + sourceRect.height / 2);
const scale = getCenterCardScale(sourceRect);
const hitDx = dx * 0.96;
const hitDy = dy * 0.96;
const recoilDx = dx * 0.68;
const recoilDy = dy * 0.68;
const wobble = playedBy === playerId ? -22 : 22;
const clashDuration = Math.max(1500, durationMs);
flashDeckRejectRing(clashDuration * .2);
flashDeckRejectRing(clashDuration * .48);
flashDeckRejectRing(clashDuration * .76);

clone.animate([
{ transform: "translate3d(0,0,0) scale(1)", opacity: 1, offset: 0 },
{ transform: `translate3d(${hitDx}px, ${hitDy}px, 0) scale(${scale * 1.04}) rotate(${wobble * .25}deg)`, filter: "drop-shadow(0 0 30px rgba(255,107,107,1))", opacity: 1, offset: .2 },
{ transform: `translate3d(${recoilDx - wobble}px, ${recoilDy + 6}px, 0) scale(${scale * .88}) rotate(${-wobble * .55}deg)`, filter: "drop-shadow(0 0 12px rgba(255,107,107,.65))", opacity: 1, offset: .32 },
{ transform: `translate3d(${hitDx + wobble * .28}px, ${hitDy - 4}px, 0) scale(${scale * 1.06}) rotate(${wobble * .34}deg)`, filter: "drop-shadow(0 0 34px rgba(255,107,107,1))", opacity: 1, offset: .48 },
{ transform: `translate3d(${recoilDx + wobble * .65}px, ${recoilDy - 7}px, 0) scale(${scale * .9}) rotate(${-wobble * .42}deg)`, filter: "drop-shadow(0 0 14px rgba(255,107,107,.7))", opacity: 1, offset: .6 },
{ transform: `translate3d(${hitDx - wobble * .18}px, ${hitDy + 3}px, 0) scale(${scale * 1.07}) rotate(${-wobble * .25}deg)`, filter: "drop-shadow(0 0 38px rgba(255,107,107,1))", opacity: 1, offset: .76 },
{ transform: `translate3d(${recoilDx * .92}px, ${recoilDy * .92}px, 0) scale(${scale * .94}) rotate(${wobble * .18}deg)`, filter: "drop-shadow(0 0 18px rgba(255,107,107,.8))", opacity: .98, offset: .88 },
{ transform: `translate3d(${hitDx}px, ${hitDy}px, 0) scale(${scale * 1.02}) rotate(0deg)`, filter: "drop-shadow(0 0 30px rgba(255,107,107,.95))", opacity: .94, offset: 1 }
], {
duration: clashDuration,
easing: "cubic-bezier(.18,.88,.2,1)",
fill: "forwards"
});

setTimeout(() => {
clone.remove();
activeMovementClones.delete(key);
}, clashDuration + 260);
}

function animateBlockedCardToCenter(card, playedBy, reason="local_block"){
console.warn("animateBlockedCardToCenter", {
reason,
playedBy,
cardId: card && card.id,
pendingCardId,
localMovementStartedFor,

clone.style.border = "none";
clone.style.boxShadow = "none";
clone.style.outline = "none";
clone.style.padding = "0";

const dy = targetRect.top + targetRect.height / 2 - (sourceRect.top + sourceRect.height / 2);
const scale = getCenterCardScale(sourceRect);
const wallDx = dx * 0.78;
const wallDy = dy * 0.78;
flashDeckRejectRing(Math.max(120, CARD_TRAVEL_MS * 0.55));

requestAnimationFrame(() => requestAnimationFrame(() => {

setTimeout(() => {
clone.style.transition = "transform .42s cubic-bezier(.4,0,.2,1), opacity .42s ease";
clone.style.transform = "translate3d(0,0,0) scale(1)";
clone.style.opacity = "0.75";
}, Math.max(260, CARD_TRAVEL_MS * 0.72));

setTimeout(() => {
clone.remove();
}, CARD_TRAVEL_MS + 260);
}

function triggerBattleImpact(durationMs=3000){

if(battleImpactTimer){
clearTimeout(battleImpactTimer);
battleImpactTimer = null;
}
if(centerArea) centerArea.classList.remove("battleImpact");

if(centerArea) void centerArea.offsetWidth;

document.body.classList.remove("battleShake");

function clearBattleIntroEffects({keepKeys = new Set()} = {}){
clearDeckRejectRing();
if(battleImpactTimer){
clearTimeout(battleImpactTimer);
battleImpactTimer = null;
}
const centerArea = document.getElementById("centerArea");
if(centerArea) centerArea.classList.remove("battleImpact");
document.body.classList.remove("battleShake");
for(const [key, clone] of activeMovementClones.entries()){
if(keepKeys.has(key)) continue;
if(clone && clone.parentNode) clone.remove();
activeMovementClones.delete(key);
activeMovementKeys.delete(key);
}
document.querySelectorAll(".cardFlyClone").forEach(clone => {
const key = movementKey({id: clone.dataset.cardId}, clone.dataset.playedBy);
if(keepKeys.has(key)) return;
clone.remove();
});
}

async function flipCard(){
console.log("flipCard called");
console.log("currentChain:", currentChain);
if(!currentChain || currentChain.flipped) {
console.log("Can't flip - no chain or already flipped");
return;
}
const roomSnap = await get(ref(db,"rooms/"+roomId));
const roomData = roomSnap.val() || {};
if(roomData.state === "playing" && !roomData.winner && !isRoundPlayable(roomData)){

if(currentChain.playedBy!==playerId) {

}

flipped:true,
phase: FLOW_PHASES.HAND_READY,

});

socket.emit('chain_flipped', { roomId, playerId });
}

setTimeout(async () => {
if(!currentChain || !currentChain.flipped) return;

const targetAnimal = currentChain.whoHas;

if(shouldFlash){

}, 500);
}

// WebSocket handler: Play card immediately (no battle)
async function playCardNow(card){
console.log("========== playCardNow START ==========");
console.log("playCardNow called with card:", card.iHave, "ID:", card.id);
console.log("   Current hand:", myHand.map(c => `${c.iHave}(${c.id})`).join(', '));

// CHECK: Does this card exist in my hand?
const cardExists = myHand.some(c => String(c.id) === String(card.id));
if(!cardExists){
console.error("CRITICAL: Card not in hand. This card was already played.");
console.log("   Requested card ID:", card.id);
console.log("   Current hand IDs:", myHand.map(c => c.id));
console.log("========== playCardNow END (card not found) ==========");
clearPendingPlayVisuals();
renderHand();
return; // ABORT - don't remove a card that's not there
}

console.log("Card exists in hand, proceeding to remove it...");

const playedAt = Date.now();
if(String(localMovementStartedFor) !== String(card.id)){
animateCardToCenter(card, playerId);
}
localMovementStartedFor = null;

let newHand = myHand.filter(c => String(c.id) !== String(card.id));
console.log("   New hand length:", newHand.length, "(was", myHand.length, ")");
myHand = newHand;

await update(ref(db,"rooms/"+roomId+"/chain"),{
iHave: card.iHave,
whoHas: card.whoHas,
flipped: false,
phase: FLOW_PHASES.CENTER_WAITING_FLIP,
face: "iHave",
playedBy: playerId,
cardId: card.id,
playedAt: playedAt
});
await update(ref(db,"rooms/"+roomId),{chainBroken:false});

// Remove card visually from pile (don't re-render entire hand)
const cardElements = document.querySelectorAll('.cardInPile');
cardElements.forEach(el => {
if(el.dataset.cardId == card.id){
el.remove();
}
});

let handObj = {};
newHand.forEach((c, idx) => handObj[idx] = c);
await set(ref(db,"rooms/"+roomId+"/hands/"+playerId), handObj);
clearPendingPlayVisuals();
setFlowPhase(FLOW_PHASES.CENTER_WAITING_FLIP);
if(socket && socket.connected){
socket.emit('chain_played', { roomId, playerId });
}

if(newHand.length === 0){
const existingWinnerSnap = await get(ref(db,"rooms/"+roomId+"/winner"));
if(existingWinnerSnap.val()){
console.log("Hand completed after round winner already exists; no score or win overlay");
console.log("====== playCardNow END ======");
return;
}

let scoresSnap = await get(ref(db,"rooms/"+roomId+"/scores"));
let scores = scoresSnap.val() || {};
if(!scores[playerId]) scores[playerId] = 0;
scores[playerId]++;
await update(ref(db,"rooms/"+roomId),{winner: playerId, scores: scores});

// Show winner announcement for 3 seconds
const overlay = document.getElementById("roundWinnerOverlay");
const winnerText = document.getElementById("roundWinnerText");
const winnerSubtext = document.getElementById("roundWinnerSubtext");

winnerText.textContent = "YOU WIN!";
winnerSubtext.textContent = "First to empty your hand!";
overlay.classList.remove("loss");
overlay.classList.add("win");
overlay.style.display = "block";

setTimeout(() => {
overlay.style.display = "none";
}, 3000);
}

console.log("====== playCardNow END ======");
}

// WebSocket handler: Battle started
let battleState = null;
let battleClicks = 0;
let battleTimerInterval = null;

function handleBattleStart(battle){
console.log("handleBattleStart", battle);

// RESET ALL BATTLE STATE
if(battleTimerInterval){
clearInterval(battleTimerInterval);
battleTimerInterval = null;
}
const battleMovementKeys = new Set();
if(battle.card1) battleMovementKeys.add(movementKey(battle.card1, battle.player1));
if(battle.card2) battleMovementKeys.add(movementKey(battle.card2, battle.player2));
clearBattleIntroEffects({keepKeys: battleMovementKeys});
pendingCardId = null;
document.querySelectorAll('.pendingPlay').forEach(el => el.classList.remove('pendingPlay'));
localMovementStartedFor = null;
canceledMovementKeys.clear();
battleState = battle;
battleClicks = 0;
setFlowPhase(FLOW_PHASES.BATTLE_INTRO);
removeCenterSurface();
const introDelay = Math.max(0, battle.startTime - Date.now());
if(battle.card1) animateBattleCardCollision(battle.card1, battle.player1, introDelay);
if(battle.card2) animateBattleCardCollision(battle.card2, battle.player2, introDelay);
triggerBattleImpact(introDelay);

// Show battle UI

battleScreen.classList.remove("battlePress", "visible");
document.body.style.overflow = "hidden";

// Reset all UI elements to default state

const scaleBeam = document.getElementById("scaleBeam");
if(scaleBeam) scaleBeam.style.transform = "rotate(0deg)";
document.getElementById("winnerAnnouncement").style.opacity = "0";
document.getElementById("winnerAnnouncement").textContent = "";

// Animate BATTLE! text
const battleText = document.getElementById("battleText");
battleText.style.opacity = "0";
battleText.style.transform = "translateY(100px)";
battleText.style.transition = "all 1s ease-out";
setTimeout(() => {
battleText.style.opacity = "1";
battleText.style.transform = "translateY(0)";
}, 50);

// Get player data from Firebase and ensure host is always on left
get(ref(db,"rooms/"+roomId+"/players")).then(snap => {
const players = snap.val();

// Determine which player is host - check the isHost property set when joining
let hostPlayerId = null;
let studentPlayerId = null;

// Method 1: Check players object for isHost flag
for(const pid in players){
// The server should have stored isHost when player joined
if(pid === playerId && isHost){
hostPlayerId = pid;
} else if(pid !== playerId && !isHost){
// The other player must be the host
hostPlayerId = pid;
}
}

// Method 2: Fallback - one of the battle participants is me
if(!hostPlayerId){
hostPlayerId = isHost ? playerId : (battle.player1 === playerId ? battle.player2 : battle.player1);
}

// Student is the other player
studentPlayerId = hostPlayerId === battle.player1 ? battle.player2 : battle.player1;
if(hostPlayerId === battle.player2) studentPlayerId = battle.player1;

// Store in battleState so updateBattleClicks can use it
battleState.hostPlayerId = hostPlayerId;
battleState.studentPlayerId = studentPlayerId;

console.log(`=== BATTLE SETUP ===`);
console.log(`I am: ${playerId}, isHost: ${isHost}`);
console.log(`Battle player1: ${battle.player1}, player2: ${battle.player2}`);
console.log(`Determined hostPlayerId: ${hostPlayerId}`);
console.log(`Determined studentPlayerId: ${studentPlayerId}`);
console.log(`==================`);

const hostName = (players[hostPlayerId] && players[hostPlayerId].name) || "Host";
const studentName = (players[studentPlayerId] && players[studentPlayerId].name) || "Student";

// Always show host on left, student on right
document.getElementById("leftName").textContent = hostName;
document.getElementById("rightName").textContent = studentName;

console.log(`Battle UI: ${hostName} (left) vs ${studentName} (right)`);
});

battleScreen.style.display = "flex";
requestAnimationFrame(() => battleScreen.classList.add("visible"));

clearInterval(battleTimerInterval);

}
}, 100);

// Set up click handler

battleButton.onclick = () => {

const remaining = Math.max(0, 5 - Math.floor(elapsed / 1000));
if(remaining <= 0) return;

battleClicks++;
console.log("Battle click:", battleClicks);
battleScreen.classList.add("battlePress");
setTimeout(() => battleScreen.classList.remove("battlePress"), 90);

// Send click to server

};

// WebSocket handler: Battle click update
function updateBattleClicks(clicks1, clicks2){
if(!battleState) return;

// Map clicks to host/student using the stored IDs
const hostClicks = battleState.player1 === battleState.hostPlayerId ? clicks1 : clicks2;
const studentClicks = battleState.player1 === battleState.hostPlayerId ? clicks2 : clicks1;

console.log(`Click update: Host=${hostClicks}, Student=${studentClicks} (p1=${clicks1}, p2=${clicks2})`);

// Calculate tipping angle based on click difference
const total = hostClicks + studentClicks;
let tiltAngle = 0;

if(total > 0){
const ratio = hostClicks / total;
// Map ratio (0 to 1) to tilt angle
// ratio > 0.5 = host winning (left down) = NEGATIVE angle
// ratio < 0.5 = student winning (right down) = POSITIVE angle
tiltAngle = -(ratio - 0.5) * 50; // Invert: negative when host ahead, positive when student ahead
}

// Apply rotation to scale beam - ONLY visual feedback, no numbers
const scaleBeam = document.getElementById("scaleBeam");
if(scaleBeam){
scaleBeam.style.transition = "transform 0.1s linear"; // Fast, direct transition - no backwards tipping
scaleBeam.style.transform = `rotate(${tiltAngle}deg)`;
}
}

// WebSocket handler: Battle result
async function handleBattleResult(result){
if(!battleState){
console.warn("Ignoring battle result with no active battle state");
return;
}
if(result.battleId && battleState.id && result.battleId !== battleState.id){
console.warn("Ignoring stale battle result:", result.battleId, "current:", battleState.id);
return;
}
console.log("handleBattleResult", result);
console.log("Battle debug info:");
console.log("  - I am:", playerId, "isHost:", isHost);
console.log("  - Battle winner:", result.winner);
console.log("  - battleState.hostPlayerId:", battleState.hostPlayerId);
console.log("  - battleState.studentPlayerId:", battleState.studentPlayerId);

if(battleTimerInterval){
clearInterval(battleTimerInterval);
battleTimerInterval = null;
}

// Determine if I won
const iWon = result.winner === playerId;

// Determine if winner is host (use isHost flag directly)
let winnerIsHost = false;
if(result.winner === playerId){
// Winner is me, check my isHost status
winnerIsHost = isHost;
} else {
// Winner is opponent, check opposite of my isHost
winnerIsHost = !isHost;

// STEP 1: Tip scale entirely to winner's side (dramatic animation)

console.log("  - Tipping scale to:", finalAngle, "degrees");

// Wait for scale animation
await new Promise(resolve => setTimeout(resolve, 800));

if(iWon){

} else {
const winnerDisplayName = document.getElementById(winnerIsHost ? "leftName" : "rightName").textContent;
winnerAnnouncement.style.color = "#dbe7f0";
winnerAnnouncement.innerHTML = `
<div style="text-align:center;">
<div style="font-size:22px;font-weight:800;margin-bottom:10px;color:#6ee3de;">BATTLE LOST</div>
<div style="font-size:64px;font-weight:900;">YOU LOST</div>
<div style="font-size:28px;margin-top:10px;">${winnerDisplayName} wins this battle</div>
</div>
`;
}

winnerAnnouncement.style.opacity = "1";

// Keep the result visible briefly, then dismiss the battle overlay.
await new Promise(resolve => setTimeout(resolve, 1800));

// Fade out
winnerAnnouncement.style.opacity = "0";
const battleScreen = document.getElementById("battleScreen");
battleScreen.classList.remove("visible");
await new Promise(resolve => setTimeout(resolve, 300));

clearBattleIntroEffects();
setFlowPhase(FLOW_PHASES.CARD_MOVING);
animateCardToCenter(result.winnerCard, result.winner);
await new Promise(resolve => setTimeout(resolve, CARD_TRAVEL_MS));

const latestBattleChain = latestRoomData && latestRoomData.chain && String(latestRoomData.chain.cardId) === String(result.winnerCard.id)
? latestRoomData.chain
: null;
const battleChainPreview = latestBattleChain && latestBattleChain.flipped ? latestBattleChain : {
iHave: result.winnerCard.iHave,
whoHas: result.winnerCard.whoHas,

face: "iHave",

};

// Winner plays card
if(result.winner === playerId){
let newHand = myHand.filter(c => String(c.id) !== String(result.winnerCard.id));

function renderChainDisplay(chain){
const deckFront=document.querySelector(".deckFront");
const deckBack=document.querySelector(".deckBack");
if(!deckFront || !deckBack) return;

const iHaveImg = CARD_IMAGES.ihave[chain.iHave];
const whoHasImg = CARD_IMAGES.whas[chain.whoHas];
const waitingForIncomingCard = !chain.flipped && centerRevealAt && Date.now() < centerRevealAt && String(centerRevealCardId) === String(chain.cardId);

if(delayedCenterRenderTimer){
clearTimeout(delayedCenterRenderTimer);
delayedCenterRenderTimer = null;
}

if(waitingForIncomingCard){
deck.classList.add("instantFaceReset");
deck.classList.remove("canFlip");
deckFront.innerHTML = "";
chainText.innerHTML = "";
delayedCenterRenderTimer = setTimeout(() => {
delayedCenterRenderTimer = null;
centerRevealAt = 0;
centerRevealCardId = null;
renderChainDisplay(chain);
}, Math.max(0, centerRevealAt - Date.now()));
return;
}

const centerSurface = getCenterSurface();
const centerSurfaceMatches = centerSurface && String(centerSurface.dataset.cardId) === String(chain.cardId);
deckFront.innerHTML = centerSurfaceMatches ? "" : (iHaveImg ?
`<img src="${iHaveImg}" alt="${chain.iHave}">` :
`<b>I HAVE</b><br>${chain.iHave}`);

deckBack.innerHTML = chain.flipped && whoHasImg ?
`<img src="${whoHasImg}" alt="${chain.whoHas}">` :
(chain.flipped ? `<b>WHO HAS</b><br>${chain.whoHas}?` : "");

if(chain.flipped){
decayCenterSurface();
deck.classList.remove("instantFaceReset");
deck.classList.add("flipped");
deck.classList.remove("canFlip");
deck.classList.remove("centerReplacing");
chainText.innerHTML="Find and play your card!";
} else {
deck.classList.remove("centerReplacing");
deck.classList.add("instantFaceReset");
deck.classList.remove("flipped");
centerRevealAt = 0;
centerRevealCardId = null;
requestAnimationFrame(() => {
deck.classList.remove("instantFaceReset");
});
if(chain.playedBy===playerId){
deck.classList.add("canFlip");
chainText.innerHTML="Click the center card to flip it!";
} else {
deck.classList.remove("canFlip");
chainText.innerHTML="Waiting for flip...";
}
}
}

latestRoomData = data;

if(data.players){
playersDiv.innerHTML="Connected:<br>";

}
allPlayersReady = data.state === "playing" && areAllPlayersReady(data);
renderCountdown(data);
setChainBrokenVisual(data.chainBroken);

if(data.state==="playing"){
lobby.style.display="none";
game.style.display="block";
document.body.classList.add("in-game"); // Add class for logo repositioning
if(data.roundStartedAt && data.roundStartedAt !== currentRoundStartedAt){
resetLocalRoundState(data.roundStartedAt);
}
// Show restart button for host when in game
if(isHost){
document.getElementById("restartBtn").style.display="flex";
} else {
document.getElementById("restartBtn").style.display="none";
}
} else {
document.body.classList.remove("in-game"); // Remove class when not in game
document.getElementById("restartBtn").style.display="none";
}

// Check winner status BEFORE rendering hands
if(data.winner){
winner=data.winner;
const winnerName = (data.players[winner] && data.players[winner].name) || "Someone";
chainText.innerHTML=(winner===playerId)?`YOU WIN`:`${winnerName} wins!`;

// Show announcement for loser too
if(winner !== playerId && roundWinnerShownFor !== winner){
roundWinnerShownFor = winner;
const overlay = document.getElementById("roundWinnerOverlay");

const winnerSubtext = document.getElementById("roundWinnerSubtext");

winnerText.textContent = "YOU LOST";
winnerSubtext.textContent = `${winnerName} finished first! Complete your chain.`;
overlay.classList.remove("win");
overlay.classList.add("loss");
overlay.style.display = "block";

setTimeout(() => {
overlay.style.display = "none";
}, 3000);
}
} else {
// Reset winner when game restarts
winner=null;
roundWinnerShownFor=null;
}

if(data.hands && data.hands[playerId]){
// Convert Firebase object back to array
const newHand = Object.values(data.hands[playerId]);

// Only re-render if hand size changed (card added/removed)
if(!myHand || myHand.length !== newHand.length){
myHand = newHand;
renderHand();
} else {
// Hand size same, just update reference
myHand = newHand;
}
}

if(data.hands){
let opponentHand = [];
for(const p in data.hands){
if(p!==playerId){
// Get opponent's actual cards
opponentHand = Object.values(data.hands[p]);
}
}
renderOpponent(opponentHand);
}

// Note: renderOpponent already fetches pile organization internally, no need to call it again here

if(data.chain){
currentChain=data.chain;
renderChainDisplay(data.chain);
syncSocketChainState(data.chain);
} else {
// No chain yet - game just started
currentChain=null;
lastSocketChainStateKey=null;
centerRevealAt=0;
centerRevealCardId=null;
deck.classList.remove("flipped");
deck.classList.remove("canFlip");
deck.classList.remove("instantFaceReset");
deck.classList.remove("centerReplacing");
removeCenterSurface();
document.querySelector(".deckFront").innerHTML="";
document.querySelector(".deckBack").innerHTML="";
chainText.innerHTML="";
}

if(data.state !== "playing"){
setFlowPhase(FLOW_PHASES.ARRANGING);
} else if(!data.countdownStartedAt){
setFlowPhase(FLOW_PHASES.ARRANGING);
} else if(!hasCountdownFinished(data)){
setFlowPhase(FLOW_PHASES.COUNTDOWN);
} else if(battleState){
// Battle handlers own the exact battle sub-phase.
} else if(currentChain && !currentChain.flipped){
setFlowPhase(FLOW_PHASES.CENTER_WAITING_FLIP);
} else {
setFlowPhase(FLOW_PHASES.HAND_READY);
}

// Display scores
if(data.scores){
const scoreBoard=document.getElementById("scoreBoard");
let scores = [];
for(const p in data.players){
const playerName = data.players[p].name;
const playerScore = data.scores[p] || 0;
scores.push(`<div><span>${playerName}:</span><b>${playerScore}</b></div>`);
}
scoreBoard.innerHTML = scores.join('');
}

updateReadyPanel(data);
});
}

// Card organization piles - 8 piles per player forming complete ellipse
function createPiles(){
const playerPilesTop = document.getElementById("playerPilesTop");
const playerPilesBottom = document.getElementById("playerPilesBottom");
const opponentPilesTop = document.getElementById("opponentPilesTop");
const opponentPilesBottom = document.getElementById("opponentPilesBottom");

// Clear existing
playerPilesTop.innerHTML = "";
playerPilesBottom.innerHTML = "";
opponentPilesTop.innerHTML = "";
opponentPilesBottom.innerHTML = "";

// Create 8 piles for player (bottom half of ellipse)
for(let i = 0; i < 8; i++){
const pile = document.createElement("div");
pile.className = "pile";
pile.dataset.pileId = `player-${i}`;

// Drag and drop handlers
pile.addEventListener('dragover', handleDragOver);
pile.addEventListener('drop', handleDrop);
pile.addEventListener('dragleave', handleDragLeave);

playerPilesTop.appendChild(pile);
}

// Create 1 communal pile for player (bottom - unorganized cards)
const playerCommunal = document.createElement("div");
playerCommunal.className = "pile communal";
playerCommunal.dataset.pileId = "player-communal";
playerCommunal.addEventListener('dragover', handleDragOver);
playerCommunal.addEventListener('drop', handleDrop);
playerCommunal.addEventListener('dragleave', handleDragLeave);
playerPilesBottom.appendChild(playerCommunal);

// Create 8 piles for opponent (top half of ellipse)
for(let i = 0; i < 8; i++){
const pile = document.createElement("div");
pile.className = "pile";
pile.dataset.pileId = `opponent-${i}`;
opponentPilesTop.appendChild(pile);
}

// Create 1 communal pile for opponent (hidden - you don't see their unorganized cards)
const opponentCommunal = document.createElement("div");
opponentCommunal.className = "pile communal";
opponentCommunal.dataset.pileId = "opponent-communal";
opponentPilesBottom.appendChild(opponentCommunal);
}

function isLandingPile(pile){
const pileId = pile.dataset.pileId || "";
return pileId.startsWith("player-") && pileId !== "player-communal";
}

function isMyOrganizationComplete(){
if(!myHand || myHand.length === 0) return false;
const landedIds = new Set();
document.querySelectorAll('[data-pile-id^="player-"]').forEach(pile => {
if(!isLandingPile(pile)) return;
pile.querySelectorAll('.cardInPile').forEach(card => landedIds.add(card.dataset.cardId));
});
return myHand.every(card => landedIds.has(String(card.id)));
}

function areAllPlayersReady(roomData){
const players = (roomData && roomData.players) || {};
const ready = (roomData && roomData.organizationReady) || {};
const playerIds = Object.keys(players);
return playerIds.length >= 2 && playerIds.every(id => ready[id] === true || (id === playerId && localReadySubmitted));
}

function hasCountdownFinished(roomData){
const startedAt = Number((roomData && roomData.countdownStartedAt) || 0);
return startedAt > 0 && Date.now() - startedAt >= COUNTDOWN_DURATION_MS;
}

function isRoundPlayable(roomData){
return roomData && roomData.state === "playing" && hasCountdownFinished(roomData);
}

function willAllPlayersBeReady(roomData, ready){
const players = (roomData && roomData.players) || {};
const playerIds = Object.keys(players);
return playerIds.length >= 2 && playerIds.every(id => ready[id] === true);
}

function renderCountdown(roomData){
const overlay = document.getElementById("countdownOverlay");
const text = document.getElementById("countdownText");
if(countdownRenderInterval){
clearInterval(countdownRenderInterval);
countdownRenderInterval = null;
}

if(!roomData || roomData.state !== "playing" || !roomData.countdownStartedAt || roomData.winner){
overlay.style.display = "none";
return;
}

const updateCountdown = () => {
const elapsed = Date.now() - Number(roomData.countdownStartedAt);
if(elapsed < 0){
text.textContent = "3";
overlay.style.display = "flex";
return;
}
if(elapsed < 1000){
text.textContent = "3";
} else if(elapsed < 2000){
text.textContent = "2";
} else if(elapsed < 3000){
text.textContent = "1";
} else if(elapsed < COUNTDOWN_DURATION_MS){
text.textContent = "GO";
} else {
overlay.style.display = "none";
if(countdownRenderInterval){
clearInterval(countdownRenderInterval);
countdownRenderInterval = null;
}
if(!currentChain || currentChain.flipped){
setFlowPhase(FLOW_PHASES.HAND_READY);
}
updateReadyPanel(latestRoomData);
return;
}
overlay.style.display = "flex";
};

updateCountdown();
countdownRenderInterval = setInterval(updateCountdown, 120);
}

function updateReadyPanel(roomData){
const panel = document.getElementById("readyPanel");
const button = document.getElementById("readyBtn");
const status = document.getElementById("readyStatus");
if(!roomData || roomData.state !== "playing" || roomData.winner || hasCountdownFinished(roomData)){
panel.style.display = "none";
return;
}

const ready = roomData.organizationReady || {};
const myReady = ready[playerId] === true || localReadySubmitted;
if(ready[playerId] === true) localReadySubmitted = true;
const organized = isMyOrganizationComplete();

if(myReady){
panel.style.display = areAllPlayersReady(roomData) ? "none" : "flex";
button.disabled = true;
button.textContent = "Ready";
status.textContent = areAllPlayersReady(roomData) ? "Starting..." : "Waiting for the other player";
return;
}

panel.style.display = "flex";
button.disabled = !organized;
button.textContent = "Ready to go";
status.textContent = organized ? "All set?" : "Arrange all your cards first";
}

async function handleReadyClick(){
if(!roomId || !playerId) return;
if(!isMyOrganizationComplete()){
updateReadyPanel(latestRoomData);
return;
}
localReadySubmitted = true;
document.getElementById("readyBtn").disabled = true;
document.getElementById("readyStatus").textContent = "Waiting for the other player";
document.getElementById("readyPanel").style.display = "none";
const roomSnap = await get(ref(db,"rooms/"+roomId));
const roomData = roomSnap.val();
if(roomData){
await update(ref(db,"rooms/"+roomId), {[`organizationReady/${playerId}`]: true});
const freshSnap = await get(ref(db,"rooms/"+roomId));
const freshRoomData = freshSnap.val();
if(freshRoomData && freshRoomData.state === "playing" && !freshRoomData.countdownStartedAt && willAllPlayersBeReady(freshRoomData, freshRoomData.organizationReady || {})){
await update(ref(db,"rooms/"+roomId), {countdownStartedAt: Date.now()});
}
}
}

// Save current pile organization to Firebase
async function savePileOrganization(){
const pileOrganization = {};

// Get all player piles
const allPiles = document.querySelectorAll('[data-pile-id^="player-"]');
allPiles.forEach(pile => {
const pileId = pile.dataset.pileId;
const cardsInPile = pile.querySelectorAll('.cardInPile');
const cardIds = Array.from(cardsInPile).map(card => card.dataset.cardId);
if(cardIds.length > 0){
pileOrganization[pileId] = cardIds;
}
});

// Save to Firebase
await set(ref(db, `rooms/${roomId}/pileOrganization/${playerId}`), pileOrganization);
if(!allPlayersReady && !localReadySubmitted){
await set(ref(db, `rooms/${roomId}/organizationReady/${playerId}`), false);
}
updateReadyPanel(latestRoomData);
}

let draggedCard = null;

function handleDragStart(e){
draggedCard = e.target;
e.target.classList.add('dragging');
e.dataTransfer.effectAllowed = 'move';
}

function handleDragEnd(e){
e.target.classList.remove('dragging');
draggedCard = null;

// Remove dragOver from all piles
document.querySelectorAll('.pile').forEach(p => p.classList.remove('dragOver'));
}

function handleDragOver(e){
e.preventDefault();
e.dataTransfer.dropEffect = 'move';
e.currentTarget.classList.add('dragOver');
}

function handleDragLeave(e){
e.currentTarget.classList.remove('dragOver');
}

function handleDrop(e){
e.preventDefault();
const pile = e.currentTarget;
pile.classList.remove('dragOver');

if(draggedCard){
// Check if card is coming from overlay
const overlay = document.getElementById("cardOverlay");
const overlayCards = document.getElementById("overlayCards");
const isFromOverlay = overlayCards.contains(draggedCard);

pile.appendChild(draggedCard);

// If card came from overlay, enable click-to-play
if(isFromOverlay){
const cardId = draggedCard.dataset.cardId;
const card = myHand.find(c => c.id == cardId);
if(card){
draggedCard.onclick = (event) => {
console.log("Card clicked:", card);
tryPlay(card, event.currentTarget);
};
draggedCard.style.cursor = "pointer";
}
}

// Save pile organization to Firebase
savePileOrganization();

// Check if overlay should be hidden (all cards moved out)
if(overlay.classList.contains('visible')){
refreshArrangementOverlay();
}

// Update communal pile visibility
const communalPile = document.querySelector('[data-pile-id="player-communal"]');
if(communalPile){
const cardsInCommunal = communalPile.querySelectorAll('.cardInPile');
if(cardsInCommunal.length === 0){
communalPile.style.display = 'none';
} else {
communalPile.style.display = 'flex';
}
}
}
}

// Confetti celebration animation
function createConfetti(){
const battleScreen = document.getElementById("battleScreen");
const colors = ['#e4e09a', '#6ee3de', '#50d3df', '#eff8d7'];

for(let i = 0; i < 30; i++){
const confetti = document.createElement('div');
confetti.style.position = 'absolute';
confetti.style.left = Math.random() * 100 + '%';
confetti.style.top = '-50px';
const size = 6 + Math.random() * 8;
confetti.style.width = size + 'px';
confetti.style.height = size + 'px';
confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
confetti.style.opacity = '0.8';
confetti.style.pointerEvents = 'none';
confetti.style.zIndex = '1001';

battleScreen.appendChild(confetti);

// Animate falling
const duration = 2000 + Math.random() * 2000;
const finalY = window.innerHeight + 100;
confetti.animate([
{ transform: 'translateY(0) rotate(0deg)', opacity: 0.8 },
{ transform: `translateY(${finalY}px) rotate(${360 * (Math.random() * 2 - 1)}deg)`, opacity: 0 }
], {
duration: duration,
easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
}).onfinish = () => confetti.remove();
}
}

async function enterGame(){
const enterBtn = document.getElementById("enterBtn");
const loginStatus = document.getElementById("loginStatus");
enterBtn.disabled = true;
enterBtn.textContent = "Entering...";
loginStatus.textContent = "Joining room...";
try{
myName=document.getElementById("nameInput").value||"player";
let params=new URLSearchParams(location.search);
roomId=params.get("room");

if(!roomId){
roomId="room"+Math.floor(Math.random()*999999);
await set(ref(db,"rooms/"+roomId),{state:"waiting",players:{}});
isHost=true;
startBtn.style.display="inline-block";
}else{
const existingRoomSnap = await get(ref(db,"rooms/"+roomId));
if(!existingRoomSnap.exists()){
throw new Error("Room not found. Ask the host for a fresh link.");
}
isHost=false;
startBtn.style.display="none";
}

const link=location.origin+location.pathname+"?room="+roomId;
if(isHost){
document.getElementById("share").innerHTML="Send link to student:<br>"+link;
} else {
document.getElementById("share").innerHTML=""; // Student doesn't see link
}

await update(ref(db,"rooms/"+roomId+"/players/"+playerId),{name:myName});
home.style.display="none";
lobby.style.display="block";
loginStatus.textContent = "";
listenRoom();
scheduleCardImagePreload();

// Connect to WebSocket server for battles
console.log("Connecting to battle server:", BATTLE_SERVER);
socket = io(BATTLE_SERVER, {
transports: ['websocket', 'polling'],
reconnection: true
});

socket.on('connect', () => {
console.log('Connected to battle server, socket ID:', socket.id);
socket.emit('join_room', { roomId, playerId, isHost });
console.log('Sent join_room:', { roomId, playerId, isHost });
});

socket.on('connect_error', (error) => {
console.error('Connection error:', error);
});

socket.on('disconnect', (reason) => {
console.warn('Disconnected from battle server:', reason);
});

socket.on('battle_start', (battle) => {
console.log('Battle started:', battle);
clearPendingPlayVisuals();
handleBattleStart(battle);
});

socket.on('battle_update', ({ clicks1, clicks2 }) => {
console.log('Battle update:', clicks1, 'vs', clicks2);
updateBattleClicks(clicks1, clicks2);
});

socket.on('battle_result', (result) => {
console.log('Battle result:', result);
handleBattleResult(result);
});

socket.on('card_play_intent', ({ playerId: intentPlayerId, card, playId }) => {
if(!card) return;
if(intentPlayerId === playerId){
if(playId && playId !== activePlayId) return;
if(String(localMovementStartedFor) === String(card.id)) return;
}
setFlowPhase(FLOW_PHASES.CARD_MOVING);
animateCardToCenter(card, intentPlayerId);
});

socket.on('card_play_blocked', ({ playerId: blockedPlayerId, card, reason, blockedByPlayerId, playId }) => {
if(!card) return;
if(blockedPlayerId === playerId && playId && playId !== activePlayId){
console.warn("Ignoring stale block for previous play:", playId, "current:", activePlayId);
return;
}
const blockedKey = movementKey(card, blockedPlayerId);
const isOwnActiveCard = blockedPlayerId === playerId && (
activeMovementClones.has(blockedKey) ||
String(pendingCardId) === String(card.id) ||
String(localMovementStartedFor) === String(card.id)
);
if(isOwnActiveCard && (!blockedByPlayerId || blockedByPlayerId === playerId || ["awaiting_flip", "battle_active", "pending_play"].includes(reason))){
console.warn("Ignoring self-block for active moving card:", reason || "unknown", blockedByPlayerId || "unknown blocker");
return;
}
setFlowPhase(FLOW_PHASES.NEAR_BLOCK);
if(blockedPlayerId === playerId){
cancelMovement(pendingCardId || card.id, playerId);
clearPendingPlayVisuals();
}
animateBlockedCardToCenter(card, blockedPlayerId, `server_${reason || "blocked"}_by_${blockedByPlayerId || "unknown"}`);
setTimeout(() => {
if(!battleState && (!currentChain || currentChain.flipped)){
setFlowPhase(FLOW_PHASES.HAND_READY);
}
}, CARD_TRAVEL_MS + 320);
});

socket.on('play_card_now', ({ card, playId }) => {
if(playId && playId !== activePlayId){
console.warn("Ignoring stale play_card_now:", playId, "current:", activePlayId);
return;
}
console.log('SERVER SAYS: Play card now (no battle)');
console.log('   Card:', card.iHave);
console.log('   My hand before:', myHand.map(c => c.iHave));
playCardNow(card);
console.log('   My hand after:', myHand.map(c => c.iHave));
});

socket.on('play_rejected', ({ reason, blockedByPlayerId, playId }) => {
console.warn('Card play rejected by server:', reason);
if(playId && playId !== activePlayId){
console.warn("Ignoring stale play rejection:", playId, "current:", activePlayId);
return;
}
if(reason === "center_reserved" && blockedByPlayerId && blockedByPlayerId !== playerId){
console.warn("Center reserved by opponent; waiting for block animation event");
return;
}
const rejectedCardIsMoving = pendingCardId !== null && (
activeMovementClones.has(movementKey({id: pendingCardId}, playerId)) ||
String(localMovementStartedFor) === String(pendingCardId)
);
if(rejectedCardIsMoving && (blockedByPlayerId === playerId || (!blockedByPlayerId && ["center_reserved", "awaiting_flip", "battle_active", "pending_play"].includes(reason)))){
console.warn("Ignoring late self-rejection for active moving card");
return;
}
cancelMovement(pendingCardId, playerId);
clearPendingPlayVisuals();
renderHand();
if(!battleState){
setFlowPhase(currentChain && !currentChain.flipped ? FLOW_PHASES.CENTER_WAITING_FLIP : FLOW_PHASES.HAND_READY);
}
});
}catch(error){
console.error("Unable to enter game:", error);
loginStatus.textContent = error && error.message ? error.message : "Could not join. Please try again.";
enterBtn.disabled = false;
enterBtn.textContent = "Enter";
}
}

async function startGame(){
if(!isHost) return;
preloadCardImages();

// Hide overlay if visible (game restart)
const overlay = document.getElementById("cardOverlay");
overlay.classList.remove("visible");
document.getElementById("overlayCards").innerHTML = "";
clearPendingPlayVisuals();
roundWinnerShownFor = null;
setFlowPhase(FLOW_PHASES.ARRANGING);

let deck=makeDeck();
let playersSnap=await get(ref(db,"rooms/"+roomId+"/players"));
let ids=Object.keys(playersSnap.val());
let hands={};
let organizationReady={};

// Deal cards and convert arrays to objects for Firebase
ids.forEach((id,i)=>{
let playerCards = deck.filter((_,idx)=>idx%ids.length===i);
let handObj = {};
playerCards.forEach((c, idx) => handObj[idx] = c);
hands[id] = handObj;
organizationReady[id] = false;
});

// Get existing scores or initialize
let scoresSnap = await get(ref(db,"rooms/"+roomId+"/scores"));
let scores = scoresSnap.val() || {};
ids.forEach(id => {
if(!scores[id]) scores[id] = 0;
});

await update(ref(db,"rooms/"+roomId),{
state:"playing",
hands:hands,
chain:null,
chainBroken:false,
winner:null,
countdownStartedAt:null,
scores:scores,
pileOrganization:null,
organizationReady:organizationReady,
roundStartedAt: Date.now()
});
if(socket && socket.connected){
socket.emit('game_reset', { roomId, playerId });
}
}
deck.onclick=flipCard;
document.getElementById("enterBtn").onclick=enterGame;
startBtn.onclick=startGame;
restartBtn.onclick=startGame; // Reuse startGame function for restart
document.getElementById("readyBtn").onclick=handleReadyClick;
</script>
