<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Have / Who Has</title>
<style>
body{margin:0;font-family:system-ui;background:#0f172a;color:#004870;display:flex;justify-content:center;align-items:center;min-height:100vh;}
#app{width:1100px;background:#dafbe9;padding:20px;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,.5);position:relative;}
#logo{width:180px;height:180px;object-fit:contain;background:white;border-radius:50%;padding:20px;box-shadow:0 8px 24px rgba(0,72,112,0.3);margin:0 auto;display:block;transition:all 0.3s;}
body.in-game #logo{width:80px;height:80px;padding:10px;position:fixed;left:20px;top:25px;z-index:100;margin:0;transform:none;}
body.in-game h1{display:none;}
#gameSidebar{position:fixed;left:20px;top:144px;display:none;flex-direction:column;gap:15px;align-items:center;z-index:100;}
body.in-game #gameSidebar{display:flex;}
#gameSidebar #scoreBoard{position:static;transform:none;background:rgba(255,255,255,0.95);padding:8px 12px;border-radius:8px;border:2px solid #16b7a7;font-size:12px;color:#004870;width:110px;text-align:left;}
#gameSidebar #scoreBoard > div{display:flex;justify-content:space-between;align-items:center;margin:3px 0;}
#gameSidebar #scoreBoard b{color:#23879f;}
#gameSidebar #restartBtn{position:static;width:40px;height:40px;border-radius:50%;background:#23879f;border:2px solid #16b7a7;cursor:pointer;font-size:24px;padding:0;display:flex;align-items:center;justify-content:center;color:white;}
#gameSidebar #restartBtn:hover{background:#16b7a7;transform:rotate(180deg);transition:all 0.3s;}
#home{text-align:center;max-width:400px;margin:0 auto;}
#home input{width:100%;max-width:300px;margin:10px auto;display:block;}
#home button{width:100%;max-width:300px;margin:10px auto;display:block;}
#lobby{text-align:center;}
h1{margin:20px 0 30px 0;color:#004870;text-align:center;font-size:28px;font-weight:700;}
#headerBar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding:0 20px;}
#headerBar > div{flex:1;display:flex;align-items:center;gap:15px;}
input,button{padding:8px;border-radius:6px;border:none;margin:6px 0;}
button{background:#23879f;color:white;cursor:pointer;font-weight:600;}
button:hover{background:#16b7a7;}
#lobby,#game{display:none}
#game{position:relative;}
#players{font-size:14px;margin-top:10px;color:#004870;}
#board{display:grid;grid-template-rows:160px 200px 1fr;height:650px;background:#c4f7e5;border-radius:12px;padding:10px;}
#opponentArea{border-bottom:2px solid #16b7a7;display:flex;justify-content:center;align-items:center;}
#opponentGrid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;width:90%;}
.opponentCard{background:#bdf6e0;height:45px;border-radius:6px;opacity:.95;border:2px solid #16b7a7;}
#centerArea{display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative;}
#deck{background:linear-gradient(135deg, #23879f, #16b7a7);width:220px;height:120px;border-radius:10px;display:flex;justify-content:center;align-items:center;text-align:center;padding:10px;cursor:pointer;transition:transform .1s;position:relative;perspective:1000px;box-shadow:0 4px 20px rgba(35,135,159,0.4);}
#deck:hover{transform:scale(1.03);}
#deck.canFlip{box-shadow:0 0 30px rgba(110,227,222,0.8);border:2px solid #6ee3de;}
#chainText{margin-top:12px;font-size:18px;font-weight:500;text-align:center;color:#b2ecd1;}
#scoreBoard{position:absolute;top:20px;right:20px;background:rgba(0,72,112,0.8);padding:12px 16px;border-radius:8px;font-size:14px;border:2px solid #16b7a7;line-height:1.6;}
#restartBtn{position:absolute;top:20px;left:20px;}
#playerArea{border-top:2px solid #16b7a7;display:flex;justify-content:center;align-items:center;}
#playerGrid{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;width:90%;}
.playerCard{background:linear-gradient(135deg, #004870, #023047);height:95px;border-radius:8px;cursor:pointer;display:flex;flex-direction:column;justify-content:center;align-items:center;font-size:13px;text-align:center;transition:transform .08s;padding:6px;border:2px solid #16b7a7;}
.playerCard:hover{transform:scale(1.05);border-color:#6ee3de;box-shadow:0 0 15px rgba(110,227,222,0.5);}
.playerCard.wrong,.playerCard.wrongCard{animation:shake 0.4s;border-color:#ff6b6b !important;background:linear-gradient(135deg, #8b0000, #ff6b6b) !important;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
.wrongCard{animation:shake 0.4s,flashRed 0.4s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-10px);}75%{transform:translateX(10px);}}
@keyframes flashRed{0%,100%{background:linear-gradient(135deg, #004870, #023047);}50%{background:#8b0000;border-color:#ff0000;}}
.deckInner{position:relative;width:100%;height:100%;transition:transform 0.6s;transform-style:preserve-3d;}
#deck.flipped .deckInner{transform:rotateY(180deg);}
.deckFront,.deckBack{position:absolute;width:100%;height:100%;backface-visibility:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;font-size:16px;}
.deckBack{transform:rotateY(180deg);}
</style>
</head>
<body>
<div id="app">
<img id="logo" src="https://i.ibb.co/C3KcP9cZ/Adaptivelogotrans.png" alt="Logo">
<h1>I Have / Who Has</h1>

<div id="home">
Enter your name<br>
<input id="nameInput" placeholder="name"><br>
<button id="enterBtn">Enter</button>
</div>

<div id="lobby">
<div id="share"></div>
<div id="players"></div>
<br>
<button id="startGameBtn">Start Game</button>
</div>

<div id="game">
<div id="board">
<div id="opponentArea"><div id="opponentGrid"></div></div>
<div id="centerArea">
<div id="deck">
<div class="deckInner">
<div class="deckFront">Waiting...</div>
<div class="deckBack"></div>
</div>
</div>
<div id="chainText"></div>
</div>
<div id="playerArea"><div id="playerGrid"></div></div>
</div>
</div>

<!-- Game Sidebar (appears during game) -->
<div id="gameSidebar">
<div id="scoreBoard"></div>
<button id="restartBtn" style="display:none;">↻</button>
</div>

<!-- Battle Screen -->
<div id="battleScreen" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:linear-gradient(135deg, rgba(0,72,112,0.98), rgba(35,135,159,0.98));z-index:1000;flex-direction:column;justify-content:space-between;align-items:center;padding:40px 0;overflow:hidden;">
<div id="battleText" style="font-size:80px;font-weight:900;color:#e4e09a;text-shadow:0 0 40px rgba(228,224,154,0.8);opacity:0;">BATTLE!</div>

<!-- Tipping Scale Battle UI -->
<div style="display:flex;flex-direction:column;align-items:center;gap:30px;width:600px;">
<div id="battleTimer" style="font-size:48px;font-weight:700;color:#eff8d7;text-shadow:0 0 20px rgba(239,248,215,0.5);">5</div>

<div style="display:flex;align-items:flex-end;justify-content:space-between;width:100%;padding:0 40px;">
<div style="text-align:center;flex:0 0 140px;">
<div id="leftName" style="font-size:28px;font-weight:700;color:#6ee3de;"></div>
</div>

<!-- SVG Tipping Scale -->
<div style="flex:1;display:flex;justify-content:center;align-items:flex-end;height:200px;">
<svg width="400" height="200" viewBox="0 0 400 200" style="overflow:visible;">
<!-- Fulcrum/Stand -->
<path d="M 180 180 L 200 200 L 220 180 Z" fill="#50d3df" stroke="#16b7a7" stroke-width="2"/>
<circle cx="200" cy="180" r="8" fill="#23879f" stroke="#16b7a7" stroke-width="2"/>

<!-- Scale Beam (will rotate) -->
<g id="scaleBeam" style="transform-origin: 200px 180px; transition: transform 0.1s ease-out;">
<line x1="40" y1="180" x2="360" y2="180" stroke="#16b7a7" stroke-width="6" stroke-linecap="round"/>
<!-- Left Pan -->
<rect x="20" y="165" width="60" height="35" rx="5" fill="#6ee3de" stroke="#16b7a7" stroke-width="2"/>
<!-- Right Pan -->
<rect x="320" y="165" width="60" height="35" rx="5" fill="#e4e09a" stroke="#16b7a7" stroke-width="2"/>
</g>
</svg>
</div>

<div style="text-align:center;flex:0 0 140px;">
<div id="rightName" style="font-size:28px;font-weight:700;color:#e4e09a;"></div>
</div>
</div>
</div>

<!-- Centered Battle Button -->
<div style="text-align:center;margin-bottom:20px;">
<div id="battleButton" style="width:140px;height:140px;background:#23879f;border-radius:50%;box-shadow:0 20px 60px rgba(35,135,159,0.8);cursor:pointer;transition:transform 0.05s;margin:0 auto;user-select:none;border:4px solid #6ee3de;" onmousedown="this.style.transform='scale(0.95)'" onmouseup="this.style.transform='scale(1)'"></div>
<div style="font-size:20px;font-weight:600;margin-top:15px;color:#dafbe9;">CLICK!</div>
</div>

<!-- Winner Announcement (hidden by default) -->
<div id="winnerAnnouncement" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:64px;font-weight:900;text-align:center;opacity:0;pointer-events:none;text-shadow:0 0 40px rgba(255,255,255,0.8);transition:opacity 0.5s;z-index:10;color:#eff8d7;"></div>
</div>
</div>

<!-- Socket.IO Client Library -->
<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, update, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyCZ4aNmk7xmpRnSe3ZOhOpkgGiCxQxKqSE",
authDomain:"i-have-d5728.firebaseapp.com",
databaseURL:"https://i-have-d5728-default-rtdb.firebaseio.com",
projectId:"i-have-d5728",
storageBucket:"i-have-d5728.firebasestorage.app",
messagingSenderId:"1041491068804",
appId:"1:1041491068804:web:21b0d472c5f2929d04bfd1"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let roomId=null;
let playerId="p"+Math.floor(Math.random()*999999);
let myName="";
let isHost=false;
let myHand=[];
let currentChain=null;
let winner=null;

// WebSocket connection for battles
const BATTLE_SERVER = "https://ihave.onrender.com";
let socket = null;

// DECK CONFIGURATION
// This structure allows easy theming - just swap out the theme object
// Each card has: id, iHave (what this card shows), whoHas (what it asks for)
// Future: add imageUrl or themeId to each card for custom graphics

const DECK_THEME = {
  name: "Animals",
  cards: [
    {id: 0, iHave: "Dog", whoHas: "Cat"},
    {id: 1, iHave: "Cat", whoHas: "Shark"},
    {id: 2, iHave: "Shark", whoHas: "Pig"},
    {id: 3, iHave: "Pig", whoHas: "Alligator"},
    {id: 4, iHave: "Alligator", whoHas: "Snake"},
    {id: 5, iHave: "Snake", whoHas: "Horse"},
    {id: 6, iHave: "Horse", whoHas: "Elephant"},
    {id: 7, iHave: "Elephant", whoHas: "Pig"},
    {id: 8, iHave: "Pig", whoHas: "Snake"},
    {id: 9, iHave: "Snake", whoHas: "Dog"},
    {id: 10, iHave: "Dog", whoHas: "Pig"},
    {id: 11, iHave: "Pig", whoHas: "Horse"},
    {id: 12, iHave: "Horse", whoHas: "Shark"},
    {id: 13, iHave: "Shark", whoHas: "Dog"},
    {id: 14, iHave: "Dog", whoHas: "Alligator"},
    {id: 15, iHave: "Alligator", whoHas: "Elephant"},
    {id: 16, iHave: "Elephant", whoHas: "Snake"},
    {id: 17, iHave: "Snake", whoHas: "Cat"},
    {id: 18, iHave: "Cat", whoHas: "Elephant"},
    {id: 19, iHave: "Elephant", whoHas: "Shark"},
    {id: 20, iHave: "Shark", whoHas: "Alligator"},
    {id: 21, iHave: "Alligator", whoHas: "Cat"},
    {id: 22, iHave: "Cat", whoHas: "Horse"},
    {id: 23, iHave: "Horse", whoHas: "Dog"}
  ]
};

const home=document.getElementById("home");
const lobby=document.getElementById("lobby");
const game=document.getElementById("game");
const playersDiv=document.getElementById("players");
const startBtn=document.getElementById("startGameBtn");
const restartBtn=document.getElementById("restartBtn");
const playerGrid=document.getElementById("playerGrid");
const opponentGrid=document.getElementById("opponentGrid");
const chainText=document.getElementById("chainText");
const deck=document.getElementById("deck");

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a}

function makeDeck(){
  // Return a shuffled copy of the predefined deck
  return shuffle([...DECK_THEME.cards]);
}

function renderHand(){
console.log("renderHand called, myHand:", myHand);
playerGrid.innerHTML="";
myHand.forEach(card=>{
let div=document.createElement("div");
div.className="playerCard";
div.innerHTML=`<b>I HAVE</b><br>${card.iHave}`;
// Only make clickable if no winner
if(!winner){
div.onclick=(event)=>{
console.log("Card clicked:", card);
tryPlay(card, event.target);
};
} else {
div.style.opacity="0.5";
div.style.cursor="not-allowed";
}
playerGrid.appendChild(div);
});
console.log("Cards rendered:", playerGrid.children.length);
}

function renderOpponent(count){
opponentGrid.innerHTML="";
for(let i=0;i<count;i++){
let d=document.createElement("div");
d.className="opponentCard";
opponentGrid.appendChild(d);
}
}

async function tryPlay(card, cardElement){
console.log("tryPlay called with card:", card);
console.log("winner:", winner);
console.log("currentChain:", currentChain);

if(winner) {
console.log("Game over, winner exists");
return;
}

// If chain exists and is flipped, check if this card matches
if(currentChain && currentChain.flipped){
// Check if card matches the target
const matchesTarget = card.iHave === currentChain.whoHas;
  
if(!matchesTarget){
// Card doesn't match - check if chain is broken (no cards with target animal left)
const targetAnimal = currentChain.whoHas;
    
// Get all hands from Firebase to check if target animal still exists
let handsSnap = await get(ref(db,"rooms/"+roomId+"/hands"));
let allHands = handsSnap.val() || {};
    
let targetExists = false;
for(const playerId in allHands){
const hand = Object.values(allHands[playerId]);
if(hand.some(c => c.iHave === targetAnimal)){
targetExists = true;
break;
}
}
    
if(targetExists){
console.log("Card doesn't match chain and target still exists in play");

// NEGATIVE FEEDBACK: Shake and flash red
if(cardElement){
cardElement.classList.add('wrongCard');
setTimeout(() => cardElement.classList.remove('wrongCard'), 400);
}

return; // Wrong card, can't play
} else {
console.log("Chain broken! Target animal depleted, allowing any card to restart chain");

// VISUAL INDICATOR: Flash to show chain is broken
const playerArea = document.getElementById("playerArea");
const opponentArea = document.getElementById("opponentArea");
playerArea.style.background = "#e4e09a";
opponentArea.style.background = "#e4e09a";
setTimeout(() => {
playerArea.style.background = "";
opponentArea.style.background = "";
}, 800);

// Chain is broken - allow this card to restart the chain
}
}
}

// If chain exists but is not flipped, player must flip first
if(currentChain && !currentChain.flipped) {
console.log("Chain not flipped yet, must flip first");
return;
}

console.log("Playing card...");

// Check if socket is connected
if(!socket || !socket.connected){
console.error("Socket not connected! Falling back to immediate play");
playCardNow(card);
return;
}

// Send card play to WebSocket server for battle detection
console.log("Sending card_played to server:", {roomId, playerId, card, isHost});
socket.emit('card_played', {
roomId: roomId,
playerId: playerId,
card: card,
isHost: isHost
});

console.log("card_played event sent, waiting for server response...");
// Note: Server will either trigger battle_start or play_card_now
// Don't play the card here - wait for server response
}

async function flipCard(){
console.log("flipCard called");
console.log("currentChain:", currentChain);
if(!currentChain || currentChain.flipped) {
console.log("Can't flip - no chain or already flipped");
return;
}
if(currentChain.playedBy!==playerId) {
console.log("Can't flip - not your card");
return;
}
console.log("Flipping card...");
await update(ref(db,"rooms/"+roomId+"/chain"),{flipped:true});
}

let battleAnimationShown = false;
let battleActive = false;
let currentBattleId = null;
let localClickCount = 0;
let battleTimer = null;

// OLD FIREBASE BATTLE CODE REMOVED - All battles now handled by WebSocket server

// WebSocket handler: Play card immediately (no battle)
async function playCardNow(card){
console.log("⚠️ playCardNow called with card:", card);
console.trace("Call stack:"); // This will show what called this function

let newHand = myHand.filter(c => c.id !== card.id);
myHand = newHand;
renderHand();

let handObj = {};
newHand.forEach((c, idx) => handObj[idx] = c);
await set(ref(db,"rooms/"+roomId+"/hands/"+playerId), handObj);
await update(ref(db,"rooms/"+roomId+"/chain"),{
iHave: card.iHave,
whoHas: card.whoHas,
flipped: false,
playedBy: playerId
});

if(newHand.length === 0){
let scoresSnap = await get(ref(db,"rooms/"+roomId+"/scores"));
let scores = scoresSnap.val() || {};
if(!scores[playerId]) scores[playerId] = 0;
scores[playerId]++;
await update(ref(db,"rooms/"+roomId),{winner: playerId, scores: scores});
}
}

// WebSocket handler: Battle started
let battleState = null;
let battleClicks = 0;
let battleTimerInterval = null;

function handleBattleStart(battle){
console.log("handleBattleStart", battle);

// RESET ALL BATTLE STATE
if(battleTimerInterval){
clearInterval(battleTimerInterval);
battleTimerInterval = null;
}
battleState = battle;
battleClicks = 0;

// Show battle UI
const battleScreen = document.getElementById("battleScreen");
battleScreen.style.display = "flex";
document.body.style.overflow = "hidden";

// Reset all UI elements to default state
document.getElementById("battleTimer").textContent = "5";
const scaleBeam = document.getElementById("scaleBeam");
if(scaleBeam) scaleBeam.style.transform = "rotate(0deg)";
document.getElementById("winnerAnnouncement").style.opacity = "0";
document.getElementById("winnerAnnouncement").textContent = "";

// Animate BATTLE! text
const battleText = document.getElementById("battleText");
battleText.style.opacity = "0";
battleText.style.transform = "translateY(100px)";
battleText.style.transition = "all 1s ease-out";
setTimeout(() => {
battleText.style.opacity = "1";
battleText.style.transform = "translateY(0)";
}, 50);

// Get player data from Firebase and ensure host is always on left
get(ref(db,"rooms/"+roomId+"/players")).then(snap => {
const players = snap.val();

// Determine which player is host - check the isHost property set when joining
let hostPlayerId = null;
let studentPlayerId = null;

// Method 1: Check players object for isHost flag
for(const pid in players){
// The server should have stored isHost when player joined
if(pid === playerId && isHost){
hostPlayerId = pid;
} else if(pid !== playerId && !isHost){
// The other player must be the host
hostPlayerId = pid;
}
}

// Method 2: Fallback - one of the battle participants is me
if(!hostPlayerId){
hostPlayerId = isHost ? playerId : (battle.player1 === playerId ? battle.player2 : battle.player1);
}

// Student is the other player
studentPlayerId = hostPlayerId === battle.player1 ? battle.player2 : battle.player1;
if(hostPlayerId === battle.player2) studentPlayerId = battle.player1;

// Store in battleState so updateBattleClicks can use it
battleState.hostPlayerId = hostPlayerId;
battleState.studentPlayerId = studentPlayerId;

console.log(`=== BATTLE SETUP ===`);
console.log(`I am: ${playerId}, isHost: ${isHost}`);
console.log(`Battle player1: ${battle.player1}, player2: ${battle.player2}`);
console.log(`Determined hostPlayerId: ${hostPlayerId}`);
console.log(`Determined studentPlayerId: ${studentPlayerId}`);
console.log(`==================`);

const hostName = players[hostPlayerId]?.name || "Host";
const studentName = players[studentPlayerId]?.name || "Student";

// Always show host on left, student on right
document.getElementById("leftName").textContent = hostName;
document.getElementById("rightName").textContent = studentName;

console.log(`Battle UI: ${hostName} (left) vs ${studentName} (right)`);
});

// Start countdown timer
let elapsed = 0;
battleTimerInterval = setInterval(() => {
elapsed = Date.now() - battle.startTime;
const remaining = Math.max(0, 5 - Math.floor(elapsed / 1000));
document.getElementById("battleTimer").textContent = remaining;

if(remaining === 0 && battleTimerInterval){
clearInterval(battleTimerInterval);
battleTimerInterval = null;
// Tell server battle ended
socket.emit('battle_end', { roomId });
}
}, 100);

// Set up click handler
const battleButton = document.getElementById("battleButton");
battleButton.onclick = () => {
if(!battleState) return;
const elapsed = Date.now() - battleState.startTime;
const remaining = Math.max(0, 5 - Math.floor(elapsed / 1000));
if(remaining <= 0) return;

battleClicks++;
console.log("Battle click:", battleClicks);

// Send click to server
socket.emit('battle_click', { roomId, playerId });
};
}

// WebSocket handler: Battle click update
function updateBattleClicks(clicks1, clicks2){
if(!battleState) return;

// Map clicks to host/student using the stored IDs
const hostClicks = battleState.player1 === battleState.hostPlayerId ? clicks1 : clicks2;
const studentClicks = battleState.player1 === battleState.hostPlayerId ? clicks2 : clicks1;

console.log(`Click update: Host=${hostClicks}, Student=${studentClicks} (p1=${clicks1}, p2=${clicks2})`);

// Calculate tipping angle based on click difference
const total = hostClicks + studentClicks;
let tiltAngle = 0;

if(total > 0){
const ratio = hostClicks / total;
// Map ratio (0 to 1) to tilt angle (-25 to +25 degrees)
// 0.5 = balanced (0°), <0.5 tips right, >0.5 tips left
tiltAngle = (ratio - 0.5) * 50; // Max 25° tilt each direction
}

// Apply rotation to scale beam - ONLY visual feedback, no numbers
const scaleBeam = document.getElementById("scaleBeam");
if(scaleBeam){
scaleBeam.style.transform = `rotate(${-tiltAngle}deg)`;
}
}

// WebSocket handler: Battle result
async function handleBattleResult(result){
console.log("handleBattleResult", result);

if(battleTimerInterval){
clearInterval(battleTimerInterval);
battleTimerInterval = null;
}

// Determine if I won
const iWon = result.winner === playerId;
const winnerIsHost = result.winner === battleState.hostPlayerId;

// STEP 1: Tip scale entirely to winner's side (dramatic animation)
const scaleBeam = document.getElementById("scaleBeam");
if(scaleBeam){
const finalAngle = winnerIsHost ? -25 : 25; // -25 = left (host), +25 = right (student)
scaleBeam.style.transition = "transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55)"; // Bouncy
scaleBeam.style.transform = `rotate(${-finalAngle}deg)`;
}

// Wait for scale animation
await new Promise(resolve => setTimeout(resolve, 800));

// STEP 2: Show personalized winner announcement with celebration/sadness
const winnerAnnouncement = document.getElementById("winnerAnnouncement");

if(iWon){
// I WON! 🎉
winnerAnnouncement.innerHTML = `
<div style="text-align:center;">
<div style="font-size:80px;margin-bottom:20px;">🎉</div>
<div style="font-size:64px;font-weight:900;">YOU WON!</div>
<div style="font-size:40px;margin-top:10px;">✨ 🎊 ✨</div>
</div>
`;
winnerAnnouncement.style.color = "#eff8d7";

// Confetti effect (simple emoji rain)
createConfetti();
} else {
// I LOST 😢
const winnerName = winnerIsHost ? battleState.hostPlayerId : battleState.studentPlayerId;
const winnerDisplayName = document.getElementById(winnerIsHost ? "leftName" : "rightName").textContent;
winnerAnnouncement.innerHTML = `
<div style="text-align:center;">
<div style="font-size:80px;margin-bottom:20px;">😢</div>
<div style="font-size:48px;font-weight:700;">${winnerDisplayName} wins...</div>
</div>
`;
winnerAnnouncement.style.color = "#94a3b8";
}

winnerAnnouncement.style.opacity = "1";

// Wait 3 seconds
await new Promise(resolve => setTimeout(resolve, 3000));

// Fade out
winnerAnnouncement.style.opacity = "0";
await new Promise(resolve => setTimeout(resolve, 500));

// Winner plays card
if(result.winner === playerId){
let newHand = myHand.filter(c => c.id !== result.winnerCard.id);
myHand = newHand;

let handObj = {};
newHand.forEach((c, idx) => handObj[idx] = c);
await set(ref(db,"rooms/"+roomId+"/hands/"+playerId), handObj);

await update(ref(db,"rooms/"+roomId+"/chain"),{
iHave: result.winnerCard.iHave,
whoHas: result.winnerCard.whoHas,
flipped: false,
playedBy: result.winner
});

renderHand();

if(newHand.length === 0){
let scoresSnap = await get(ref(db,"rooms/"+roomId+"/scores"));
let scores = scoresSnap.val() || {};
if(!scores[playerId]) scores[playerId] = 0;
scores[playerId]++;
await update(ref(db,"rooms/"+roomId),{winner: playerId, scores: scores});
}
} else {
// Loser - just re-render hand (card stays)
renderHand();
}

// Hide battle screen
document.getElementById("battleScreen").style.display = "none";
document.body.style.overflow = "auto";
battleState = null;
battleClicks = 0;
}

// OLD listenPendingPlay removed - battles now handled by WebSocket

function listenRoom(){
onValue(ref(db,"rooms/"+roomId),snap=>{
let data=snap.val();
if(!data) return;

if(data.players){
playersDiv.innerHTML="Connected:<br>";
for(const p in data.players){ playersDiv.innerHTML+=data.players[p].name+"<br>"; }
}

if(data.state==="playing"){ 
lobby.style.display="none"; 
game.style.display="block";
document.body.classList.add("in-game"); // Add class for logo repositioning
// Show restart button for host when in game
if(isHost){
document.getElementById("restartBtn").style.display="inline-block";
}
} else {
document.body.classList.remove("in-game"); // Remove class when not in game
}

// Check winner status BEFORE rendering hands
if(data.winner){
winner=data.winner;
const winnerName = data.players[winner]?.name || "Someone";
chainText.innerHTML=(winner===playerId)?`YOU WIN 🎉`:`${winnerName} wins!`;
} else {
// Reset winner when game restarts
winner=null;
}

if(data.hands && data.hands[playerId]){
// Convert Firebase object back to array
myHand = Object.values(data.hands[playerId]);
renderHand();
}

if(data.hands){
let opp=0;
for(const p in data.hands){
if(p!==playerId){
// Count cards in opponent's hand (convert object to array)
opp = Object.keys(data.hands[p]).length;
}
}
renderOpponent(opp);
}

if(data.chain){
currentChain=data.chain;
const deckFront=document.querySelector(".deckFront");
const deckBack=document.querySelector(".deckBack");

if(data.chain.flipped){
deck.classList.add("flipped");
deck.classList.remove("canFlip");
deckFront.innerHTML=`<b>I HAVE</b><br>${data.chain.iHave}`;
deckBack.innerHTML=`<b>WHO HAS</b><br>${data.chain.whoHas}?`;
chainText.innerHTML="Find and play your card!";
} else {
deck.classList.remove("flipped");
deckFront.innerHTML=`<b>I HAVE</b><br>${data.chain.iHave}`;
deckBack.innerHTML=`<b>WHO HAS</b><br>${data.chain.whoHas}?`;
if(data.chain.playedBy===playerId){
deck.classList.add("canFlip");
chainText.innerHTML="Click the center card to flip it!";
} else {
deck.classList.remove("canFlip");
chainText.innerHTML="Waiting for flip...";
}
}
} else {
// No chain yet - game just started
currentChain=null;
deck.classList.remove("flipped");
deck.classList.remove("canFlip");
document.querySelector(".deckFront").innerHTML="Ready to start!";
chainText.innerHTML="Play any card to begin!";
}

// Display scores
if(data.scores){
const scoreBoard=document.getElementById("scoreBoard");
let scores = [];
for(const p in data.players){
const playerName = data.players[p].name;
const playerScore = data.scores[p] || 0;
scores.push(`<div><span>${playerName}:</span><b>${playerScore}</b></div>`);
}
scoreBoard.innerHTML = scores.join('');
}

// Confetti celebration animation
function createConfetti(){
const battleScreen = document.getElementById("battleScreen");
const emojis = ['🎉', '✨', '🎊', '⭐', '💫', '🌟'];
const colors = ['#e4e09a', '#6ee3de', '#50d3df', '#eff8d7'];

for(let i = 0; i < 30; i++){
const confetti = document.createElement('div');
const isEmoji = Math.random() > 0.5;
confetti.textContent = isEmoji ? emojis[Math.floor(Math.random() * emojis.length)] : '●';
confetti.style.position = 'absolute';
confetti.style.left = Math.random() * 100 + '%';
confetti.style.top = '-50px';
confetti.style.fontSize = (20 + Math.random() * 30) + 'px';
if(!isEmoji) confetti.style.color = colors[Math.floor(Math.random() * colors.length)];
confetti.style.opacity = '0.8';
confetti.style.pointerEvents = 'none';
confetti.style.zIndex = '1001';

battleScreen.appendChild(confetti);

// Animate falling
const duration = 2000 + Math.random() * 2000;
const finalY = window.innerHeight + 100;
confetti.animate([
{ transform: 'translateY(0) rotate(0deg)', opacity: 0.8 },
{ transform: `translateY(${finalY}px) rotate(${360 * (Math.random() * 2 - 1)}deg)`, opacity: 0 }
], {
duration: duration,
easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
}).onfinish = () => confetti.remove();
}
}

// OLD Firebase battle system removed - now using WebSocket
});
}

async function enterGame(){
myName=document.getElementById("nameInput").value||"player";
let params=new URLSearchParams(location.search);
roomId=params.get("room");

if(!roomId){
roomId="room"+Math.floor(Math.random()*999999);
await set(ref(db,"rooms/"+roomId),{state:"waiting",players:{}});
isHost=true;
startBtn.style.display="inline-block";
}else{isHost=false;startBtn.style.display="none";}

const link=location.origin+location.pathname+"?room="+roomId;
document.getElementById("share").innerHTML="Send link to student:<br>"+link;

await update(ref(db,"rooms/"+roomId+"/players/"+playerId),{name:myName});
home.style.display="none";
lobby.style.display="block";
listenRoom();
// listenPendingPlay(); // REMOVED - now using WebSocket server for battles

// Connect to WebSocket server for battles
console.log("Connecting to battle server:", BATTLE_SERVER);
socket = io(BATTLE_SERVER, {
transports: ['websocket', 'polling'],
reconnection: true
});

socket.on('connect', () => {
console.log('✅ Connected to battle server, socket ID:', socket.id);
socket.emit('join_room', { roomId, playerId, isHost });
console.log('Sent join_room:', { roomId, playerId, isHost });
});

socket.on('connect_error', (error) => {
console.error('❌ Connection error:', error);
});

socket.on('disconnect', (reason) => {
console.warn('⚠️ Disconnected from battle server:', reason);
});

socket.on('battle_start', (battle) => {
console.log('🎮 Battle started!', battle);
handleBattleStart(battle);
});

socket.on('battle_update', ({ clicks1, clicks2 }) => {
console.log('🔄 Battle update:', clicks1, 'vs', clicks2);
updateBattleClicks(clicks1, clicks2);
});

socket.on('battle_result', (result) => {
console.log('🏆 Battle result:', result);
handleBattleResult(result);
});

socket.on('play_card_now', ({ card }) => {
console.log('▶️ Play card now (no battle):', card);
playCardNow(card);
});
}

async function startGame(){
if(!isHost) return;
let deck=makeDeck();
let playersSnap=await get(ref(db,"rooms/"+roomId+"/players"));
let ids=Object.keys(playersSnap.val());
let hands={};

// Deal cards and convert arrays to objects for Firebase
ids.forEach((id,i)=>{
let playerCards = deck.filter((_,idx)=>idx%ids.length===i);
let handObj = {};
playerCards.forEach((c, idx) => handObj[idx] = c);
hands[id] = handObj;
});

// Get existing scores or initialize
let scoresSnap = await get(ref(db,"rooms/"+roomId+"/scores"));
let scores = scoresSnap.val() || {};
ids.forEach(id => {
if(!scores[id]) scores[id] = 0;
});

await update(ref(db,"rooms/"+roomId),{
state:"playing",
hands:hands,
chain:null,
winner:null,
scores:scores
});
}

deck.onclick=flipCard;
document.getElementById("enterBtn").onclick=enterGame;
startBtn.onclick=startGame;
restartBtn.onclick=startGame; // Reuse startGame function for restart
</script>
