<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Have / Who Has – Online</title>

<style>

body{
    margin:0;
    font-family:system-ui;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

#app{
    width:950px;
    background:#1e293b;
    padding:22px;
    border-radius:12px;
    box-shadow:0 10px 40px rgba(0,0,0,.5);
}

h1{
    margin-top:0;
}

input,button{
    padding:8px;
    border-radius:6px;
    border:none;
    margin:6px 0;
}

button{
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

#teacherPanel,
#studentPanel,
#gamePanel{
    display:none;
}

#grid{
    margin-top:20px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.cardPile{
    background:#020617;
    border-radius:8px;
    padding:14px;
    text-align:center;
    cursor:pointer;
    border:2px solid transparent;
}

.cardPile:hover{
    border-color:#3b82f6;
}

.count{
    font-size:12px;
    color:#94a3b8;
}

#chain{
    margin-top:18px;
    padding:12px;
    background:#020617;
    border-radius:8px;
    font-size:20px;
    text-align:center;
}

#battle{
    margin-top:18px;
    padding:12px;
    background:#7f1d1d;
    border-radius:8px;
    display:none;
}

.meter{
    height:20px;
    background:#020617;
    border-radius:6px;
    overflow:hidden;
    margin-top:6px;
}

.fill{
    height:100%;
    background:#22c55e;
    width:0%;
}

#log{
    margin-top:15px;
    height:120px;
    overflow:auto;
    background:#020617;
    padding:10px;
    border-radius:6px;
    font-size:12px;
}

</style>
</head>

<body>

<div id="app">

<h1>I Have / Who Has</h1>

<div id="home">
    <button id="teacherBtn">Teacher Host Game</button>
</div>


<div id="teacherPanel">

<h2>Teacher Panel</h2>

Room Name<br>
<input id="roomInput" placeholder="class1">

<br>

<button id="createRoomBtn">Create Room</button>
<button id="startGameBtn">Start Game</button>

<div id="studentLink"></div>

</div>


<div id="studentPanel">

<h2>Join Game</h2>

Name<br>
<input id="studentName" placeholder="name">

<br>

<button id="joinBtn">Join</button>

</div>


<div id="gamePanel">

<div id="chain">
Waiting...
</div>

<div id="grid"></div>

<div id="battle">

⚔ BATTLE ⚔<br>
Mash SPACE

<div>
Student
<div class="meter">
<div id="studentFill" class="fill"></div>
</div>
</div>

<div>
Teacher
<div class="meter">
<div id="teacherFill" class="fill"></div>
</div>
</div>

</div>

<div id="log"></div>

</div>

</div>


<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getDatabase,
    ref,
    set,
    update,
    onValue
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {

    apiKey: "AIzaSyCZ4aNmk7xmpRnSe3ZOhOpkgGiCxQxKqSE",
    authDomain: "i-have-d5728.firebaseapp.com",
    databaseURL: "https://i-have-d5728-default-rtdb.firebaseio.com",
    projectId: "i-have-d5728",
    storageBucket: "i-have-d5728.firebasestorage.app",
    messagingSenderId: "1041491068804",
    appId: "1:1041491068804:web:21b0d472c5f2929d04bfd1"

};


const app = initializeApp(firebaseConfig);
const db = getDatabase(app);


const animals = [
    "alligator",
    "elephant",
    "snake",
    "lion",
    "dog",
    "cat",
    "horse",
    "monkey"
];


let roomId = null;
let role = "teacher";
let playerId = "p" + Math.floor(Math.random()*999999);

let myCards = [];


const studentAdvantage = 1.25;

let battleCounts = {
    student:0,
    teacher:0
};

let battleActive = false;


const home = document.getElementById("home");
const teacherPanel = document.getElementById("teacherPanel");
const studentPanel = document.getElementById("studentPanel");
const gamePanel = document.getElementById("gamePanel");

const grid = document.getElementById("grid");
const chainEl = document.getElementById("chain");
const logEl = document.getElementById("log");


function log(text){

    const div = document.createElement("div");
    div.textContent = text;

    logEl.appendChild(div);
    logEl.scrollTop = logEl.scrollHeight;

}


function shuffle(array){

    for(let i=array.length-1;i>0;i--){

        const j = Math.floor(Math.random()*(i+1));
        [array[i],array[j]] = [array[j],array[i]];

    }

    return array;

}


function generateDeck(){

    let deck = [];

    for(let i=0;i<animals.length;i++){

        const have = animals[i];
        const who = animals[(i+1)%animals.length];

        for(let c=0;c<3;c++){

            deck.push({
                have:have,
                who:who
            });

        }

    }

    return shuffle(deck);

}



function buildGrid(){

    const groups = {};

    myCards.forEach(card => {

        if(!groups[card.have]){
            groups[card.have] = [];
        }

        groups[card.have].push(card);

    });


    grid.innerHTML = "";


    animals.forEach(animal => {

        const pile = groups[animal] || [];

        const div = document.createElement("div");

        div.className = "cardPile";

        div.innerHTML = `
            <b>${animal}</b>
            <div class="count">${pile.length}</div>
        `;

        div.onclick = () => playAnimal(animal);

        grid.appendChild(div);

    });

}



async function createRoom(){

    roomId =
        document.getElementById("roomInput").value
        || "room"+Math.floor(Math.random()*999);

    await set(
        ref(db,"rooms/"+roomId),
        {
            state:"waiting",
            teacher:playerId
        }
    );

    teacherPanel.style.display="block";

    const link =
        location.origin +
        location.pathname +
        "?room="+roomId;

    document.getElementById("studentLink").innerHTML =
        "Student link:<br>"+link;

    listenRoom();

}



async function joinStudent(){

    roomId = new URLSearchParams(location.search).get("room");

    role = "student";

    await update(
        ref(db,"rooms/"+roomId+"/players"),
        {
            [playerId]:{
                name:document.getElementById("studentName").value
            }
        }
    );

    studentPanel.style.display="none";
    gamePanel.style.display="block";

    listenRoom();

}



async function startGame(){

    const deck = generateDeck();

    await update(
        ref(db,"rooms/"+roomId),
        {
            state:"playing",
            deck:deck
        }
    );

}



function listenRoom(){

    onValue(
        ref(db,"rooms/"+roomId),
        snapshot => {

            const data = snapshot.val();

            if(!data) return;


            if(data.state==="playing" && myCards.length===0){

                const deck = data.deck;

                if(role==="teacher"){
                    myCards = deck.slice(0,12);
                }else{
                    myCards = deck.slice(12);
                }

                buildGrid();

                gamePanel.style.display="block";

            }


            if(data.chain){

                chainEl.textContent =
                    "I HAVE "
                    + data.chain.have.toUpperCase()
                    + " — WHO HAS "
                    + data.chain.who.toUpperCase();

            }

        }
    );

}



async function playAnimal(animal){

    const card = myCards.find(
        c => c.have === animal
    );

    if(!card) return;


    await update(
        ref(db,"rooms/"+roomId),
        {
            chain:card
        }
    );


    myCards = myCards.filter(
        c => c !== card
    );

    buildGrid();

}



window.addEventListener("keydown", event => {

    if(event.code==="Space" && battleActive){

        battleCounts[role]++;

    }

});



if(new URLSearchParams(location.search).get("room")){

    home.style.display="none";
    studentPanel.style.display="block";

}
else{

    home.style.display="block";

}


document.getElementById("teacherBtn").onclick = () => {

    home.style.display="none";
    teacherPanel.style.display="block";

};

document.getElementById("createRoomBtn").onclick = createRoom;
document.getElementById("joinBtn").onclick = joinStudent;
document.getElementById("startGameBtn").onclick = startGame;

</script>

</body>
</html>
