<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Have / Who Has</title>
<style>
body{margin:0;font-family:system-ui;background:#0f172a;color:white;display:flex;justify-content:center;align-items:center;min-height:100vh;}
#app{width:1100px;background:#1e293b;padding:20px;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,.5);}
h1{margin-top:0}
input,button{padding:8px;border-radius:6px;border:none;margin:6px 0;}
button{background:#2563eb;color:white;cursor:pointer;}
button:hover{ background:#1d4ed8; }
#lobby,#game{display:none}
#players{font-size:14px;margin-top:10px;color:#cbd5f5;}
#board{display:grid;grid-template-rows:160px 200px 1fr;height:650px;}
#opponentArea{border-bottom:1px solid #334155;display:flex;justify-content:center;align-items:center;}
#opponentGrid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;width:90%;}
.opponentCard{background:#020617;height:45px;border-radius:6px;opacity:.85;}
#centerArea{display:flex;flex-direction:column;justify-content:center;align-items:center;}
#deck{background:#020617;width:220px;height:120px;border-radius:10px;display:flex;justify-content:center;align-items:center;text-align:center;padding:10px;cursor:pointer;transition:transform .1s;position:relative;perspective:1000px;}
#deck:hover{transform:scale(1.03);}
#deck.canFlip{box-shadow:0 0 20px rgba(37,99,235,0.6);}
#chainText{margin-top:12px;font-size:18px;font-weight:500;text-align:center;color:#94a3b8;}
#playerArea{border-top:1px solid #334155;display:flex;justify-content:center;align-items:center;}
#playerGrid{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;width:90%;}
.playerCard{background:#020617;height:95px;border-radius:8px;cursor:pointer;display:flex;flex-direction:column;justify-content:center;align-items:center;font-size:13px;text-align:center;transition:transform .08s;padding:6px;}
.playerCard:hover{transform:scale(1.05);}
.deckInner{position:relative;width:100%;height:100%;transition:transform 0.6s;transform-style:preserve-3d;}
#deck.flipped .deckInner{transform:rotateY(180deg);}
.deckFront,.deckBack{position:absolute;width:100%;height:100%;backface-visibility:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;font-size:16px;}
.deckBack{transform:rotateY(180deg);}
</style>
</head>
<body>
<div id="app">
<h1>I Have / Who Has</h1>

<div id="home">
Enter your name<br>
<input id="nameInput" placeholder="name"><br>
<button id="enterBtn">Enter</button>
</div>

<div id="lobby">
<div id="share"></div>
<div id="players"></div>
<br>
<button id="startGameBtn">Start Game</button>
</div>

<div id="game">
<div id="board">
<div id="opponentArea"><div id="opponentGrid"></div></div>
<div id="centerArea">
<div id="deck">
<div class="deckInner">
<div class="deckFront">Waiting...</div>
<div class="deckBack"></div>
</div>
</div>
<div id="chainText"></div>
<div id="scoreBoard" style="margin-top:20px;font-size:16px;"></div>
<button id="restartBtn" style="display:none;margin-top:10px;">Restart Game (New Round)</button>
</div>
<div id="playerArea"><div id="playerGrid"></div></div>
</div>
</div>

<!-- Battle Screen -->
<div id="battleScreen" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(15,23,42,0.95);z-index:1000;flex-direction:column;justify-content:center;align-items:center;">
<div id="battleText" style="font-size:120px;font-weight:900;color:#ef4444;text-shadow:0 0 40px rgba(239,68,68,0.8);margin-bottom:60px;opacity:0;">BATTLE!</div>
<div style="display:flex;align-items:center;gap:80px;width:80%;">
<div style="display:flex;flex-direction:column;align-items:center;gap:20px;">
<div id="leftHand" style="font-size:100px;cursor:pointer;user-select:none;">👆</div>
<div id="leftButton" style="width:120px;height:120px;background:#ef4444;border-radius:50%;box-shadow:0 10px 30px rgba(239,68,68,0.6);cursor:pointer;"></div>
<div id="leftName" style="font-size:24px;font-weight:600;"></div>
</div>
<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:20px;">
<div id="battleTimer" style="font-size:48px;font-weight:700;color:#94a3b8;">5</div>
<div style="width:100%;height:40px;background:#1e293b;border-radius:20px;overflow:hidden;position:relative;">
<div id="progressBar" style="position:absolute;left:50%;width:0%;height:100%;background:linear-gradient(90deg, #3b82f6, #ef4444);transition:all 0.1s;transform:translateX(-50%);"></div>
<div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:4px;height:100%;background:white;z-index:10;"></div>
</div>
<div id="clickCounts" style="font-size:20px;color:#94a3b8;"></div>
</div>
<div style="display:flex;flex-direction:column;align-items:center;gap:20px;">
<div id="rightHand" style="font-size:100px;cursor:pointer;user-select:none;">👆</div>
<div id="rightButton" style="width:120px;height:120px;background:#ef4444;border-radius:50%;box-shadow:0 10px 30px rgba(239,68,68,0.6);cursor:pointer;"></div>
<div id="rightName" style="font-size:24px;font-weight:600;"></div>
</div>
</div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, update, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyCZ4aNmk7xmpRnSe3ZOhOpkgGiCxQxKqSE",
authDomain:"i-have-d5728.firebaseapp.com",
databaseURL:"https://i-have-d5728-default-rtdb.firebaseio.com",
projectId:"i-have-d5728",
storageBucket:"i-have-d5728.firebasestorage.app",
messagingSenderId:"1041491068804",
appId:"1:1041491068804:web:21b0d472c5f2929d04bfd1"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let roomId=null;
let playerId="p"+Math.floor(Math.random()*999999);
let myName="";
let isHost=false;
let myHand=[];
let currentChain=null;
let winner=null;

// DECK CONFIGURATION
// This structure allows easy theming - just swap out the theme object
// Each card has: id, iHave (what this card shows), whoHas (what it asks for)
// Future: add imageUrl or themeId to each card for custom graphics

const DECK_THEME = {
  name: "Animals",
  cards: [
    {id: 0, iHave: "Dog", whoHas: "Cat"},
    {id: 1, iHave: "Cat", whoHas: "Shark"},
    {id: 2, iHave: "Shark", whoHas: "Pig"},
    {id: 3, iHave: "Pig", whoHas: "Alligator"},
    {id: 4, iHave: "Alligator", whoHas: "Snake"},
    {id: 5, iHave: "Snake", whoHas: "Horse"},
    {id: 6, iHave: "Horse", whoHas: "Elephant"},
    {id: 7, iHave: "Elephant", whoHas: "Pig"},
    {id: 8, iHave: "Pig", whoHas: "Snake"},
    {id: 9, iHave: "Snake", whoHas: "Dog"},
    {id: 10, iHave: "Dog", whoHas: "Pig"},
    {id: 11, iHave: "Pig", whoHas: "Horse"},
    {id: 12, iHave: "Horse", whoHas: "Shark"},
    {id: 13, iHave: "Shark", whoHas: "Dog"},
    {id: 14, iHave: "Dog", whoHas: "Alligator"},
    {id: 15, iHave: "Alligator", whoHas: "Elephant"},
    {id: 16, iHave: "Elephant", whoHas: "Snake"},
    {id: 17, iHave: "Snake", whoHas: "Cat"},
    {id: 18, iHave: "Cat", whoHas: "Elephant"},
    {id: 19, iHave: "Elephant", whoHas: "Shark"},
    {id: 20, iHave: "Shark", whoHas: "Alligator"},
    {id: 21, iHave: "Alligator", whoHas: "Cat"},
    {id: 22, iHave: "Cat", whoHas: "Horse"},
    {id: 23, iHave: "Horse", whoHas: "Dog"}
  ]
};

const home=document.getElementById("home");
const lobby=document.getElementById("lobby");
const game=document.getElementById("game");
const playersDiv=document.getElementById("players");
const startBtn=document.getElementById("startGameBtn");
const restartBtn=document.getElementById("restartBtn");
const playerGrid=document.getElementById("playerGrid");
const opponentGrid=document.getElementById("opponentGrid");
const chainText=document.getElementById("chainText");
const deck=document.getElementById("deck");

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a}

function makeDeck(){
  // Return a shuffled copy of the predefined deck
  return shuffle([...DECK_THEME.cards]);
}

function renderHand(){
console.log("renderHand called, myHand:", myHand);
playerGrid.innerHTML="";
myHand.forEach(card=>{
let div=document.createElement("div");
div.className="playerCard";
div.innerHTML=`<b>I HAVE</b><br>${card.iHave}`;
// Only make clickable if no winner
if(!winner){
div.onclick=()=>{
console.log("Card clicked:", card);
tryPlay(card);
};
} else {
div.style.opacity="0.5";
div.style.cursor="not-allowed";
}
playerGrid.appendChild(div);
});
console.log("Cards rendered:", playerGrid.children.length);
}

function renderOpponent(count){
opponentGrid.innerHTML="";
for(let i=0;i<count;i++){
let d=document.createElement("div");
d.className="opponentCard";
opponentGrid.appendChild(d);
}
}

async function tryPlay(card){
console.log("tryPlay called with card:", card);
console.log("winner:", winner);
console.log("currentChain:", currentChain);

if(winner) {
console.log("Game over, winner exists");
return;
}

// If chain exists and is flipped, check if this card matches
if(currentChain && currentChain.flipped){
// Check if card matches the target
const matchesTarget = card.iHave === currentChain.whoHas;
  
if(!matchesTarget){
// Card doesn't match - check if chain is broken (no cards with target animal left)
const targetAnimal = currentChain.whoHas;
    
// Get all hands from Firebase to check if target animal still exists
let handsSnap = await get(ref(db,"rooms/"+roomId+"/hands"));
let allHands = handsSnap.val() || {};
    
let targetExists = false;
for(const playerId in allHands){
const hand = Object.values(allHands[playerId]);
if(hand.some(c => c.iHave === targetAnimal)){
targetExists = true;
break;
}
}
    
if(targetExists){
console.log("Card doesn't match chain and target still exists in play");
return; // Wrong card, can't play
} else {
console.log("Chain broken! Target animal depleted, allowing any card to restart chain");
// Chain is broken - allow this card to restart the chain
}
}
}

// If chain exists but is not flipped, player must flip first
if(currentChain && !currentChain.flipped) {
console.log("Chain not flipped yet, must flip first");
return;
}

console.log("Playing card...");

// BATTLE DETECTION: Check for simultaneous plays
const now = Date.now();
let battleSnap = await get(ref(db,"rooms/"+roomId+"/pendingPlay"));
let pendingPlay = battleSnap.val();

if(pendingPlay && pendingPlay.playerId !== playerId && (now - pendingPlay.timestamp) < 2000){
// Simultaneous play detected! Trigger battle
console.log("BATTLE! Two cards played within 2000ms");
  
// Determine who is the student (non-host) - 50/50 chance they get bonus multiplier
const player1IsHost = pendingPlay.playerId === (isHost ? playerId : null);
const hasStudentBonus = Math.random() < 0.5; // 50/50 chance
  
await update(ref(db,"rooms/"+roomId+"/battle"),{
player1: pendingPlay.playerId,
player2: playerId,
card1: pendingPlay.card,
card2: card,
clicks1: 0,
clicks2: 0,
studentBonus: hasStudentBonus,
startTime: now,
active: true
});
  
// Clear pending play
await set(ref(db,"rooms/"+roomId+"/pendingPlay"), null);
console.log("Battle triggered, waiting for resolution...");
return; // Don't update hand or play card - wait for battle resolution
}

// No battle detected yet - register this as a pending play
await set(ref(db,"rooms/"+roomId+"/pendingPlay"),{
playerId: playerId,
card: card,
timestamp: now
});

// Wait a moment to see if opponent plays
await new Promise(resolve => setTimeout(resolve, 2100));

// Check if battle was triggered by opponent
let battleCheck = await get(ref(db,"rooms/"+roomId+"/battle"));
if(battleCheck.val()?.active){
console.log("Battle triggered by opponent, waiting...");
// Clear pending play
await set(ref(db,"rooms/"+roomId+"/pendingPlay"), null);
return; // Battle started, don't continue - hand stays intact
}

// No battle - clear pending and play normally
await set(ref(db,"rooms/"+roomId+"/pendingPlay"), null);

let newHand=myHand.filter(c=>c.id!==card.id);
console.log("newHand length:", newHand.length);

// Update local hand immediately for instant UI feedback
myHand = newHand;
renderHand();

// Convert array to object for Firebase (Firebase doesn't accept raw arrays in update)
let handObj = {};
newHand.forEach((c, idx) => handObj[idx] = c);

// Use set() instead of update() to replace the entire hand (not merge)
await set(ref(db,"rooms/"+roomId+"/hands/"+playerId), handObj);
await update(ref(db,"rooms/"+roomId+"/chain"),{
iHave:card.iHave,
whoHas:card.whoHas,
flipped:false,
playedBy:playerId
});

if(newHand.length===0){
console.log("Hand is empty! Player wins!");

// Update score
let scoresSnap = await get(ref(db,"rooms/"+roomId+"/scores"));
let scores = scoresSnap.val() || {};
if(!scores[playerId]) scores[playerId] = 0;
scores[playerId]++;

// Set winner immediately - first to finish wins
await update(ref(db,"rooms/"+roomId),{
winner:playerId,
scores:scores
});
}
}

async function flipCard(){
console.log("flipCard called");
console.log("currentChain:", currentChain);
if(!currentChain || currentChain.flipped) {
console.log("Can't flip - no chain or already flipped");
return;
}
if(currentChain.playedBy!==playerId) {
console.log("Can't flip - not your card");
return;
}
console.log("Flipping card...");
await update(ref(db,"rooms/"+roomId+"/chain"),{flipped:true});
}

let battleAnimationShown = false;
let battleInterval = null;
let battleActive = false;

async function handleBattle(battle, players){
console.log("handleBattle called", battle);

// Check if battle just ended
if(!battle.active){
console.log("Battle ended, cleaning up");
if(battleInterval){
clearInterval(battleInterval);
battleInterval = null;
}
battleActive = false;
battleAnimationShown = false;
document.getElementById("battleScreen").style.display = "none";
return;
}

const battleScreen = document.getElementById("battleScreen");
battleScreen.style.display = "flex";

// Show BATTLE! animation once
if(!battleAnimationShown){
battleAnimationShown = true;
battleActive = true;
const battleText = document.getElementById("battleText");
battleText.style.opacity = "0";
battleText.style.transform = "translateY(100px)";
battleText.style.transition = "all 1s ease-out";
setTimeout(() => {
battleText.style.opacity = "1";
battleText.style.transform = "translateY(0)";
}, 50);
}

// Set player names
const player1Name = players[battle.player1]?.name || "Player 1";
const player2Name = players[battle.player2]?.name || "Player 2";
const isPlayer1 = battle.player1 === playerId;
const isPlayer2 = battle.player2 === playerId;
const isStudent = !isHost;

console.log("I am player1:", isPlayer1, "I am player2:", isPlayer2, "I am student:", isStudent);

document.getElementById("leftName").textContent = player1Name;
document.getElementById("rightName").textContent = player2Name;

// Student bonus: 50/50 chance their clicks count as 1.2x (hidden)
const studentMultiplier = battle.studentBonus ? 1.2 : 1.0;

// Update timer and UI continuously
const updateBattleUI = () => {
const elapsed = Date.now() - battle.startTime;
const remaining = Math.max(0, 5 - Math.floor(elapsed / 1000));
document.getElementById("battleTimer").textContent = remaining;

// Apply student multiplier to display
let clicks1 = battle.clicks1 || 0;
let clicks2 = battle.clicks2 || 0;
  
// Don't show the multiplier - just display raw clicks
document.getElementById("clickCounts").textContent = `${clicks1} vs ${clicks2}`;

// For progress bar, apply multiplier to student's side
const player1IsStudent = battle.player1 !== playerId ? !isHost : isHost === false;
const effectiveClicks1 = player1IsStudent && battle.studentBonus ? clicks1 * studentMultiplier : clicks1;
const effectiveClicks2 = !player1IsStudent && battle.studentBonus ? clicks2 * studentMultiplier : clicks2;
  
const total = effectiveClicks1 + effectiveClicks2;
const percentage = total > 0 ? ((effectiveClicks1 / total) * 100 - 50) : 0;
document.getElementById("progressBar").style.width = Math.abs(percentage) + "%";
document.getElementById("progressBar").style.left = percentage < 0 ? "50%" : (50 - percentage) + "%";

// Check if battle should end
if(remaining === 0 && battleActive && !battle.winner){
console.log("Battle time up! Resolving...");
resolveBattle(battle, effectiveClicks1, effectiveClicks2);
}
};

// Start timer interval only once
if(!battleInterval && battleActive){
battleInterval = setInterval(updateBattleUI, 100);
}

updateBattleUI();

// Handle clicking - only set up once
if(!battleActive) return;

const leftButton = document.getElementById("leftButton");
const rightButton = document.getElementById("rightButton");
const leftHand = document.getElementById("leftHand");
const rightHand = document.getElementById("rightHand");

const clickHandler = async () => {
console.log("Button clicked!");
const elapsed = Date.now() - battle.startTime;
const remaining = Math.max(0, 5 - Math.floor(elapsed / 1000));
if(remaining <= 0) {
console.log("Battle time is up!");
return;
}
if(isPlayer1){
const newClicks = (battle.clicks1 || 0) + 1;
console.log("Player 1 clicking, new count:", newClicks);
await set(ref(db,"rooms/"+roomId+"/battle/clicks1"), newClicks);
} else if(isPlayer2){
const newClicks = (battle.clicks2 || 0) + 1;
console.log("Player 2 clicking, new count:", newClicks);
await set(ref(db,"rooms/"+roomId+"/battle/clicks2"), newClicks);
}
};

// Remove old handlers and add new ones
leftButton.onclick = null;
rightButton.onclick = null;
leftHand.onclick = null;
rightHand.onclick = null;

if(isPlayer1){
leftButton.onclick = clickHandler;
leftHand.onclick = clickHandler;
leftButton.style.cursor = "pointer";
leftHand.style.cursor = "pointer";
console.log("Player 1 buttons enabled");
} else if(isPlayer2){
rightButton.onclick = clickHandler;
rightHand.onclick = clickHandler;
rightButton.style.cursor = "pointer";
rightHand.style.cursor = "pointer";
console.log("Player 2 buttons enabled");
}
}

async function resolveBattle(battle, effectiveClicks1, effectiveClicks2){
console.log("Resolving battle:", effectiveClicks1, "vs", effectiveClicks2);
battleActive = false;
  
if(battleInterval){
clearInterval(battleInterval);
battleInterval = null;
}

// Determine winner based on effective clicks (with multiplier)
const winner = effectiveClicks1 > effectiveClicks2 ? battle.player1 : battle.player2;
const winnerCard = effectiveClicks1 > effectiveClicks2 ? battle.card1 : battle.card2;

console.log("Winner:", winner);

// Show winner announcement
const chainText = document.getElementById("chainText");
const winnerName = winner === playerId ? "YOU" : "OPPONENT";
chainText.innerHTML = `${winnerName} WIN THE BATTLE!`;

// Wait a moment before continuing
await new Promise(resolve => setTimeout(resolve, 2000));

// Play winner's card
if(winner === playerId){
let newHand = myHand.filter(c => c.id !== winnerCard.id);
myHand = newHand;
  
// Update hand in Firebase
let handObj = {};
newHand.forEach((c, idx) => handObj[idx] = c);
await set(ref(db,"rooms/"+roomId+"/hands/"+playerId), handObj);

// Update chain
await update(ref(db,"rooms/"+roomId+"/chain"),{
iHave: winnerCard.iHave,
whoHas: winnerCard.whoHas,
flipped: false,
playedBy: winner
});

renderHand();

// Check for game win
if(newHand.length === 0){
let scoresSnap = await get(ref(db,"rooms/"+roomId+"/scores"));
let scores = scoresSnap.val() || {};
if(!scores[playerId]) scores[playerId] = 0;
scores[playerId]++;
await update(ref(db,"rooms/"+roomId),{winner: playerId, scores: scores});
}
}

// Clear battle (both players do this)
await update(ref(db,"rooms/"+roomId+"/battle"),{active: false, winner: winner});
}

function listenRoom(){
onValue(ref(db,"rooms/"+roomId),snap=>{
let data=snap.val();
if(!data) return;

if(data.players){
playersDiv.innerHTML="Connected:<br>";
for(const p in data.players){ playersDiv.innerHTML+=data.players[p].name+"<br>"; }
}

if(data.state==="playing"){ 
lobby.style.display="none"; 
game.style.display="block";
// Show restart button for host when in game
if(isHost){
document.getElementById("restartBtn").style.display="inline-block";
}
}

// Check winner status BEFORE rendering hands
if(data.winner){
winner=data.winner;
const winnerName = data.players[winner]?.name || "Someone";
chainText.innerHTML=(winner===playerId)?`YOU WIN 🎉`:`${winnerName} wins!`;
} else {
// Reset winner when game restarts
winner=null;
}

if(data.hands && data.hands[playerId]){
// Convert Firebase object back to array
myHand = Object.values(data.hands[playerId]);
renderHand();
}

if(data.hands){
let opp=0;
for(const p in data.hands){
if(p!==playerId){
// Count cards in opponent's hand (convert object to array)
opp = Object.keys(data.hands[p]).length;
}
}
renderOpponent(opp);
}

if(data.chain){
currentChain=data.chain;
const deckFront=document.querySelector(".deckFront");
const deckBack=document.querySelector(".deckBack");

if(data.chain.flipped){
deck.classList.add("flipped");
deck.classList.remove("canFlip");
deckFront.innerHTML=`<b>I HAVE</b><br>${data.chain.iHave}`;
deckBack.innerHTML=`<b>WHO HAS</b><br>${data.chain.whoHas}?`;
chainText.innerHTML="Find and play your card!";
} else {
deck.classList.remove("flipped");
deckFront.innerHTML=`<b>I HAVE</b><br>${data.chain.iHave}`;
deckBack.innerHTML=`<b>WHO HAS</b><br>${data.chain.whoHas}?`;
if(data.chain.playedBy===playerId){
deck.classList.add("canFlip");
chainText.innerHTML="Click the center card to flip it!";
} else {
deck.classList.remove("canFlip");
chainText.innerHTML="Waiting for flip...";
}
}
} else {
// No chain yet - game just started
currentChain=null;
deck.classList.remove("flipped");
deck.classList.remove("canFlip");
document.querySelector(".deckFront").innerHTML="Ready to start!";
chainText.innerHTML="Play any card to begin!";
}

// Display scores
if(data.scores){
const scoreBoard=document.getElementById("scoreBoard");
let scoreHTML = "<b>Scores:</b><br>";
for(const p in data.players){
const playerName = data.players[p].name;
const playerScore = data.scores[p] || 0;
scoreHTML += `${playerName}: ${playerScore}<br>`;
}
scoreBoard.innerHTML = scoreHTML;
}

// Battle system
if(data.battle && data.battle.active){
handleBattle(data.battle, data.players);
} else {
// Hide battle screen if not active
document.getElementById("battleScreen").style.display="none";
}
});
}

async function enterGame(){
myName=document.getElementById("nameInput").value||"player";
let params=new URLSearchParams(location.search);
roomId=params.get("room");

if(!roomId){
roomId="room"+Math.floor(Math.random()*999999);
await set(ref(db,"rooms/"+roomId),{state:"waiting",players:{}});
isHost=true;
startBtn.style.display="inline-block";
}else{isHost=false;startBtn.style.display="none";}

const link=location.origin+location.pathname+"?room="+roomId;
document.getElementById("share").innerHTML="Send link to student:<br>"+link;

await update(ref(db,"rooms/"+roomId+"/players/"+playerId),{name:myName});
home.style.display="none";
lobby.style.display="block";
listenRoom();
}

async function startGame(){
if(!isHost) return;
let deck=makeDeck();
let playersSnap=await get(ref(db,"rooms/"+roomId+"/players"));
let ids=Object.keys(playersSnap.val());
let hands={};

// Deal cards and convert arrays to objects for Firebase
ids.forEach((id,i)=>{
let playerCards = deck.filter((_,idx)=>idx%ids.length===i);
let handObj = {};
playerCards.forEach((c, idx) => handObj[idx] = c);
hands[id] = handObj;
});

// Get existing scores or initialize
let scoresSnap = await get(ref(db,"rooms/"+roomId+"/scores"));
let scores = scoresSnap.val() || {};
ids.forEach(id => {
if(!scores[id]) scores[id] = 0;
});

await update(ref(db,"rooms/"+roomId),{
state:"playing",
hands:hands,
chain:null,
winner:null,
scores:scores
});
}

deck.onclick=flipCard;
document.getElementById("enterBtn").onclick=enterGame;
startBtn.onclick=startGame;
restartBtn.onclick=startGame; // Reuse startGame function for restart
</script>
</body>
