<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Have / Who Has – Online</title>

<style>
body{margin:0;font-family:system-ui;background:#0f172a;color:white;display:flex;justify-content:center;align-items:center;min-height:100vh}
#app{width:950px;background:#1e293b;padding:22px;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,.5)}
h1{margin-top:0}
input,button{padding:8px;border-radius:6px;border:none;margin:6px 0}
button{background:#2563eb;color:white;cursor:pointer}
button:hover{background:#1d4ed8}
#lobby,#gamePanel{display:none}
#players{margin-top:10px;font-size:14px;color:#cbd5f5}

#tableArea{display:flex;gap:20px;margin-top:20px}

#grid{flex:3;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

.cardPile{background:#020617;border-radius:8px;padding:14px;text-align:center;cursor:pointer}
.cardPile.disabled{opacity:0.35;cursor:not-allowed}
.count{font-size:12px;color:#94a3b8}

#deckArea{flex:1;background:#020617;border-radius:8px;padding:16px;text-align:center;cursor:pointer}

#chain{margin-top:18px;padding:12px;background:#020617;border-radius:8px;font-size:20px;text-align:center}

#log{margin-top:15px;height:120px;overflow:auto;background:#020617;padding:10px;border-radius:6px;font-size:12px}
</style>
</head>

<body>

<div id="app">

<h1>I Have / Who Has</h1>

<div id="home">
Enter your name<br>
<input id="nameInput" placeholder="name">
<br>
<button id="enterBtn">Enter</button>
</div>

<div id="lobby">
<div id="share"></div>
<div id="players"></div>
<br>
<button id="startGameBtn">Start Game</button>
</div>

<div id="gamePanel">

<div id="chain">Waiting...</div>

<div id="tableArea">

<div id="grid"></div>

<div id="deckArea">
<b>Deck</b>
<div id="deckText">Click to flip card</div>
</div>

</div>

<div id="log"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, update, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyCZ4aNmk7xmpRnSe3ZOhOpkgGiCxQxKqSE",
authDomain:"i-have-d5728.firebaseapp.com",
databaseURL:"https://i-have-d5728-default-rtdb.firebaseio.com",
projectId:"i-have-d5728",
storageBucket:"i-have-d5728.firebasestorage.app",
messagingSenderId:"1041491068804",
appId:"1:1041491068804:web:21b0d472c5f2929d04bfd1"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let roomId=null;
let playerId="p"+Math.floor(Math.random()*999999);
let myName="";

let myCards=[];
let cardsDealt=false;

let pendingCard=null;
let waitingFlip=false;

let currentTarget=null;
let chainBroken=false;

let gridOrder=[];

const animals=["alligator","elephant","snake","lion","dog","cat","horse","monkey"];

const home=document.getElementById("home");
const lobby=document.getElementById("lobby");
const gamePanel=document.getElementById("gamePanel");

const playersDiv=document.getElementById("players");

const grid=document.getElementById("grid");
const chainEl=document.getElementById("chain");
const logEl=document.getElementById("log");
const deckArea=document.getElementById("deckArea");
const deckText=document.getElementById("deckText");

function log(t){const d=document.createElement("div");d.textContent=t;logEl.appendChild(d);logEl.scrollTop=logEl.scrollHeight}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a}

function generateDeck(){
const shuffledAnimals=shuffle([...animals]);
let deck=[];
for(let i=0;i<shuffledAnimals.length;i++){
const have=shuffledAnimals[i];
const who=shuffledAnimals[(i+1)%shuffledAnimals.length];
for(let c=0;c<3;c++) deck.push({have,who});
}
return shuffle(deck);
}

function buildGrid(){

const groups={};
myCards.forEach(c=>{if(!groups[c.have]) groups[c.have]=[];groups[c.have].push(c)});

if(gridOrder.length===0) gridOrder=shuffle([...animals]);

grid.innerHTML="";

for(const a of gridOrder){

const pile=groups[a]||[];

const div=document.createElement("div");

let disabled=false;

if(!chainBroken && currentTarget && a!==currentTarget) disabled=true;
if(waitingFlip) disabled=true;

if(disabled) div.classList.add("disabled");


div.className+=" cardPile";

div.innerHTML=`<b>${a}</b><div class="count">${pile.length}</div>`;

if(!disabled && pile.length>0) div.onclick=()=>attemptPlay(a);

grid.appendChild(div);

}

}

function computeRemaining(data){
const counts={};animals.forEach(a=>counts[a]=3);
if(data.played){for(const c of data.played) counts[c.have]--}
return counts;
}

function listenRoom(){

onValue(ref(db,"rooms/"+roomId),snap=>{

const data=snap.val();
if(!data) return;

if(data.players){
playersDiv.innerHTML="Connected:<br>";
for(const p in data.players){playersDiv.innerHTML+=data.players[p].name+"<br>"}
}

if(data.state==="playing" && data.gameStarted && !cardsDealt){

const deck=data.deck;
const ids=Object.keys(data.players);
const index=ids.indexOf(playerId);
const half=deck.length/2;

if(index===0) myCards=deck.slice(0,half);
else myCards=deck.slice(half);

cardsDealt=true;

buildGrid();

gamePanel.style.display="block";
lobby.style.display="none";

}

if(data.chain && !waitingFlip){

chainEl.textContent="I HAVE "+data.chain.have.toUpperCase()+" — WHO HAS ?";
currentTarget=data.chain.who;

const remaining=computeRemaining(data);
chainBroken=remaining[currentTarget]<=0;

}

if(data.chain && data.revealed){

chainEl.textContent="I HAVE "+data.chain.have.toUpperCase()+" — WHO HAS "+data.chain.who.toUpperCase();

}

if(data.winner){
chainEl.textContent=data.winner+" wins!";
}

});

}

async function enterGame(){

myName=document.getElementById("nameInput").value||"player";

let params=new URLSearchParams(location.search);
roomId=params.get("room");

if(!roomId){
roomId="room"+Math.floor(Math.random()*999999);

await set(ref(db,"rooms/"+roomId),{
state:"waiting",
gameStarted:false,
players:{},
played:[],
revealed:false
});

const link=location.origin+location.pathname+"?room="+roomId;

document.getElementById("share").innerHTML="Send this link to student:<br>"+link;
}

await update(ref(db,"rooms/"+roomId+"/players"),{[playerId]:{name:myName}});

home.style.display="none";
lobby.style.display="block";

listenRoom();

}

async function startGame(){

const deck=generateDeck();

await update(ref(db,"rooms/"+roomId),{
state:"playing",
gameStarted:true,
deck:deck,
played:[],
chain:null,
winner:null,
revealed:false
});

}

async function attemptPlay(animal){

if(waitingFlip) return;

if(!chainBroken && currentTarget && animal!==currentTarget) return;

const card=myCards.find(c=>c.have===animal);
if(!card) return;

pendingCard=card;
waitingFlip=true;

myCards=myCards.filter(c=>c!==card);

buildGrid();

const roomRef=ref(db,"rooms/"+roomId);

const snap=await get(roomRef);
const data=snap.val();

const played=data.played||[];
played.push(card);

await update(roomRef,{chain:card,played:played,revealed:false});

}

async function flipDeck(){

if(!waitingFlip) return;

const roomRef=ref(db,"rooms/"+roomId);

await update(roomRef,{revealed:true});

waitingFlip=false;
pendingCard=null;

buildGrid();

}


document.getElementById("enterBtn").onclick=enterGame;
document.getElementById("startGameBtn").onclick=startGame;
deckArea.onclick=flipDeck;

</script>

</body>
</html>
