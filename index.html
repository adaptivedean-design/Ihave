<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Have / Who Has</title>
<style>
body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}
#app{
width:1100px;
background:#1e293b;
padding:20px;
border-radius:12px;
box-shadow:0 10px 40px rgba(0,0,0,.5);
}
h1{margin-top:0}
input,button{
padding:8px;
border-radius:6px;
border:none;
margin:6px 0;
}
button{
background:#2563eb;
color:white;
cursor:pointer;
}
button:hover{
background:#1d4ed8;
}
#lobby,#game{display:none}
#players{
font-size:14px;
margin-top:10px;
color:#cbd5f5;
}
#board{
display:grid;
grid-template-rows:160px 200px 1fr;
height:650px;
}

/* OPPONENT AREA */
#opponentArea{
border-bottom:1px solid #334155;
display:flex;
justify-content:center;
align-items:center;
}
#opponentGrid{
display:grid;
grid-template-columns:repeat(8,1fr);
gap:6px;
width:90%;
}
.opponentCard{
background:#020617;
height:45px;
border-radius:6px;
opacity:.85;
}

/* CENTER AREA */
#centerArea{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}
#deck{
background:#020617;
width:220px;
height:120px;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
}
#chainText{
margin-top:12px;
font-size:24px;
font-weight:600;
}

/* PLAYER AREA */
#playerArea{
border-top:1px solid #334155;
display:flex;
justify-content:center;
align-items:center;
}
#playerGrid{
display:grid;
grid-template-columns:repeat(8,1fr);
gap:10px;
width:90%;
}
.playerCard{
background:#020617;
height:95px;
border-radius:8px;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
font-size:13px;
text-align:center;
}
</style>
</head>
<body>
<div id="app">
<h1>I Have / Who Has</h1>

<div id="home">
Enter your name<br>
<input id="nameInput" placeholder="name"><br>
<button id="enterBtn">Enter</button>
</div>

<div id="lobby">
<div id="share"></div>
<div id="players"></div>
<br>
<button id="startGameBtn">Start Game</button>
</div>

<div id="game">
<div id="board">

<div id="opponentArea">
<div id="opponentGrid"></div>
</div>

<div id="centerArea">
<div id="deck">Flip Card</div>
<div id="chainText">Waiting...</div>
</div>

<div id="playerArea">
<div id="playerGrid"></div>
</div>

</div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, update, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"API_KEY",
authDomain:"AUTH_DOMAIN",
databaseURL:"DB_URL",
projectId:"PROJECT_ID",
storageBucket:"BUCKET",
messagingSenderId:"SENDER_ID",
appId:"APP_ID"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let roomId=null;
let playerId="p"+Math.floor(Math.random()*999999);
let myName="";
let isHost=false;

let myCards=[];
let opponentCount=0;
let cardsDealt=false;

const animals=[
"alligator","elephant","snake","lion",
"dog","cat","horse","monkey"
];

const home=document.getElementById("home");
const lobby=document.getElementById("lobby");
const game=document.getElementById("game");

const playersDiv=document.getElementById("players");
const playerGrid=document.getElementById("playerGrid");
const opponentGrid=document.getElementById("opponentGrid");
const chainText=document.getElementById("chainText");
const deck=document.getElementById("deck");
const startBtn=document.getElementById("startGameBtn");

function shuffle(a){
for(let i=a.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
return a
}

function generateDeck(){
const shuffled=shuffle([...animals]);
let deck=[];
for(let i=0;i<shuffled.length;i++){
const have=shuffled[i];
const who=shuffled[(i+1)%shuffled.length];
for(let c=0;c<3;c++) deck.push({have,who});
}
return shuffle(deck)
}

function buildPlayerGrid(){
playerGrid.innerHTML="";
myCards.forEach(card=>{
const div=document.createElement("div");
div.className="playerCard";
div.textContent=card.have;
playerGrid.appendChild(div);
});
}

function buildOpponentGrid(){
opponentGrid.innerHTML="";
for(let i=0;i<opponentCount;i++){
const div=document.createElement("div");
div.className="opponentCard";
opponentGrid.appendChild(div);
}
}

function listenRoom(){
onValue(ref(db,"rooms/"+roomId),snap=>{
const data=snap.val();
if(!data) return;

if(data.players){
playersDiv.innerHTML="Connected:<br>";
for(const p in data.players){
playersDiv.innerHTML+=data.players[p].name+"<br>";
}
}

if(data.state==="playing" && data.players && data.players[playerId] && !cardsDealt){
myCards=data.players[playerId].cards || [];
const otherId=Object.keys(data.players).find(id=>id!==playerId);
opponentCount=data.players[otherId]?.cards?.length || 0;

cardsDealt=true;
buildPlayerGrid();
buildOpponentGrid();
game.style.display="block";
lobby.style.display="none";
}

if(data.chain){
chainText.textContent="I HAVE "+data.chain.have.toUpperCase();
}
})
}

async function enterGame(){
myName=document.getElementById("nameInput").value||"player";
let params=new URLSearchParams(location.search);
roomId=params.get("room");

if(!roomId){
roomId="room"+Math.floor(Math.random()*999999);
await set(ref(db,"rooms/"+roomId),{
state:"waiting",
players:{}
});
isHost=true;
startBtn.style.display="inline-block";
}else{
isHost=false;
startBtn.style.display="none";
}

const link=location.origin+location.pathname+"?room="+roomId;
document.getElementById("share").innerHTML="Send link to student:<br>"+link;

await update(ref(db,"rooms/"+roomId+"/players/"+playerId),{
name:myName
});

home.style.display="none";
lobby.style.display="block";

listenRoom();
}

async function startGame(){
if(!isHost) return;

const snap=await get(ref(db,"rooms/"+roomId+"/players"));
const players=snap.val();
const ids=Object.keys(players);
if(ids.length<2){
alert("Waiting for second player");
return;
}

const deck=generateDeck();
const half=deck.length/2;

const updates={};
updates[`rooms/${roomId}/state`]="playing";
updates[`rooms/${roomId}/chain`]=null;
updates[`rooms/${roomId}/players/${ids[0]}/cards`]=deck.slice(0,half);
updates[`rooms/${roomId}/players/${ids[1]}/cards`]=deck.slice(half);

await update(ref(db),updates);
}

document.getElementById("enterBtn").onclick=enterGame;
startBtn.onclick=startGame;

</script>
</body>
</html>
