<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Have / Who Has – Online</title>

<style>
body{margin:0;font-family:system-ui;background:#0f172a;color:white;display:flex;justify-content:center;align-items:center;min-height:100vh}
#app{width:1100px;background:#1e293b;padding:18px;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,.5)}

h1{margin-top:0}

input,button{padding:8px;border-radius:6px;border:none;margin:6px 0}
button{background:#2563eb;color:white;cursor:pointer}
button:hover{background:#1d4ed8}

#lobby,#game{display:none}

#players{font-size:14px;margin-top:10px;color:#cbd5f5}

/* BOARD LAYOUT */

#board{
display:grid;
grid-template-rows:20% 30% 50%;
height:650px;
}

/* OPPONENT AREA */

#opponentArea{
border-bottom:1px solid #334155;
display:flex;
justify-content:center;
align-items:center;
}

#opponentGrid{
display:grid;
grid-template-columns:repeat(auto-fit,50px);
gap:6px;
justify-content:center;
}

.opponentCard{
background:#020617;
height:40px;
width:50px;
border-radius:6px;
opacity:.8;
}

/* CENTER AREA */

#centerArea{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#deck{
background:#020617;
width:200px;
height:120px;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
cursor:pointer;
padding:10px;
}

#chainText{
margin-top:10px;
font-size:22px;
font-weight:600;
}

/* PLAYER AREA */

#playerArea{
border-top:1px solid #334155;
display:flex;
justify-content:center;
align-items:center;
}

#playerGrid{
display:grid;
grid-template-columns:repeat(auto-fit,90px);
gap:10px;
justify-content:center;
}

.playerCard{
background:#020617;
height:90px;
width:90px;
border-radius:8px;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
font-size:12px;
text-align:center;
}

.playerCard.disabled{
opacity:.35;
cursor:not-allowed;
}

</style>
</head>

<body>

<div id="app">

<h1>I Have / Who Has</h1>

<div id="home">
Enter your name<br>
<input id="nameInput" placeholder="name">
<br>
<button id="enterBtn">Enter</button>
</div>

<div id="lobby">

<div id="share"></div>

<div id="players"></div>

<br>
<button id="startGameBtn">Start Game</button>

</div>

<div id="game">

<div id="board">

<div id="opponentArea">
<div id="opponentGrid"></div>
</div>

<div id="centerArea">

<div id="deck">Flip Card</div>

<div id="chainText">Waiting...</div>

</div>

<div id="playerArea">
<div id="playerGrid"></div>
</div>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, update, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyCZ4aNmk7xmpRnSe3ZOhOpkgGiCxQxKqSE",
authDomain:"i-have-d5728.firebaseapp.com",
databaseURL:"https://i-have-d5728-default-rtdb.firebaseio.com",
projectId:"i-have-d5728",
storageBucket:"i-have-d5728.firebasestorage.app",
messagingSenderId:"1041491068804",
appId:"1:1041491068804:web:21b0d472c5f2929d04bfd1"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let roomId=null;
let playerId="p"+Math.floor(Math.random()*999999);
let myName="";

let myCards=[];
let opponentCount=0;

let cardsDealt=false;
let waitingFlip=false;

let currentTarget=null;

const animals=["alligator","elephant","snake","lion","dog","cat","horse","monkey"];

const home=document.getElementById("home");
const lobby=document.getElementById("lobby");
const game=document.getElementById("game");

const playersDiv=document.getElementById("players");

const playerGrid=document.getElementById("playerGrid");
const opponentGrid=document.getElementById("opponentGrid");

const chainText=document.getElementById("chainText");
const deck=document.getElementById("deck");

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a}

function generateDeck(){
const shuffledAnimals=shuffle([...animals]);
let deck=[];
for(let i=0;i<shuffledAnimals.length;i++){
const have=shuffledAnimals[i];
const who=shuffledAnimals[(i+1)%shuffledAnimals.length];
for(let c=0;c<3;c++) deck.push({have,who});
}
return shuffle(deck);
}

function buildPlayerGrid(){

playerGrid.innerHTML="";

myCards.forEach(card=>{

const div=document.createElement("div");

div.className="playerCard";

div.textContent=card.have;

let disabled=false;

if(waitingFlip) disabled=true;

if(currentTarget && card.have!==currentTarget) disabled=true;

if(disabled) div.classList.add("disabled");

if(!disabled) div.onclick=()=>playCard(card);

playerGrid.appendChild(div);

});

}

function buildOpponentGrid(){

opponentGrid.innerHTML="";

for(let i=0;i<opponentCount;i++){

const div=document.createElement("div");


div.className="opponentCard";

opponentGrid.appendChild(div);

}

}

function listenRoom(){

onValue(ref(db,"rooms/"+roomId),snap=>{

const data=snap.val();

if(!data) return;

if(data.players){

playersDiv.innerHTML="Connected:<br>";

for(const p in data.players){

playersDiv.innerHTML+=data.players[p].name+"<br>";

}

}

if(data.state==="playing" && data.gameStarted && !cardsDealt){

const deck=data.deck;

const ids=Object.keys(data.players);

const index=ids.indexOf(playerId);

const half=deck.length/2;

if(index===0){
myCards=deck.slice(0,half);
opponentCount=half;
}
else{
myCards=deck.slice(half);
opponentCount=half;
}

cardsDealt=true;

buildPlayerGrid();
buildOpponentGrid();

game.style.display="block";
lobby.style.display="none";

}

if(data.chain){

chainText.textContent="I HAVE "+data.chain.have.toUpperCase();

currentTarget=data.chain.who;

}

if(data.revealed){

chainText.textContent="WHO HAS "+currentTarget.toUpperCase();

buildPlayerGrid();

}

});

}

async function enterGame(){

myName=document.getElementById("nameInput").value||"player";

let params=new URLSearchParams(location.search);

roomId=params.get("room");

if(!roomId){

roomId="room"+Math.floor(Math.random()*999999);

await set(ref(db,"rooms/"+roomId),{
state:"waiting",
gameStarted:false,
players:{},
played:[],
revealed:false
});

const link=location.origin+location.pathname+"?room="+roomId;


document.getElementById("share").innerHTML="Send link to student:<br>"+link;

}

await update(ref(db,"rooms/"+roomId+"/players"),{[playerId]:{name:myName}});

home.style.display="none";
lobby.style.display="block";

listenRoom();

}

async function startGame(){

const deck=generateDeck();

await update(ref(db,"rooms/"+roomId),{
state:"playing",
gameStarted:true,
deck:deck,
played:[],
chain:null,
revealed:false
});

}

async function playCard(card){

if(waitingFlip) return;

waitingFlip=true;

myCards=myCards.filter(c=>c!==card);

buildPlayerGrid();

const roomRef=ref(db,"rooms/"+roomId);

const snap=await get(roomRef);

const data=snap.val();

await update(roomRef,{chain:card,revealed:false});

chainText.textContent="I HAVE "+card.have.toUpperCase();

}

async function flipDeck(){

if(!waitingFlip) return;

await update(ref(db,"rooms/"+roomId),{revealed:true});

waitingFlip=false;

}


document.getElementById("enterBtn").onclick=enterGame;

document.getElementById("startGameBtn").onclick=startGame;

deck.onclick=flipDeck;

</script>

</body>
</html>
