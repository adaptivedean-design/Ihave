<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Have / Who Has</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

#app{
width:1100px;
background:#1e293b;
padding:20px;
border-radius:12px;
box-shadow:0 10px 40px rgba(0,0,0,.5);
}

h1{margin-top:0}

input,button{
padding:8px;
border-radius:6px;
border:none;
margin:6px 0;
}

button{
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{background:#1d4ed8}

#lobby,#game{display:none}

#board{
display:grid;
grid-template-rows:160px 200px 1fr;
height:650px;
}

#opponentArea{
border-bottom:1px solid #334155;
display:flex;
justify-content:center;
align-items:center;
}

#opponentGrid{
display:grid;
grid-template-columns:repeat(8,1fr);
gap:6px;
width:90%;
}

.opponentCard{
background:#020617;
height:45px;
border-radius:6px;
opacity:.85;
}

#centerArea{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#deck{
background:#020617;
width:220px;
height:120px;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
}

#chainText{
margin-top:12px;
font-size:24px;
font-weight:600;
}

#playerArea{
border-top:1px solid #334155;
display:flex;
justify-content:center;
align-items:center;
}

#playerGrid{
display:grid;
grid-template-columns:repeat(8,1fr);
gap:10px;
width:90%;
}

.playerCard{
background:#020617;
height:95px;
border-radius:8px;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
font-size:13px;
text-align:center;
}
</style>
</head>

<body>
<div id="app">
<h1>I Have / Who Has</h1>

<div id="home">
Enter your name<br>
<input id="nameInput" placeholder="name"><br>
<button id="enterBtn">Enter</button>
</div>

<div id="lobby">
<div id="share"></div>
<div id="players"></div><br>
<button id="startGameBtn">Start Game</button>
</div>

<div id="game">
<div id="board">
<div id="opponentArea"><div id="opponentGrid"></div></div>
<div id="centerArea">
<div id="deck">Flip Card</div>
<div id="chainText">Waiting...</div>
</div>
<div id="playerArea"><div id="playerGrid"></div></div>
</div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyCZ4aNmk7xmpRnSe3ZOhOpkgGiCxQxKqSE",
authDomain:"i-have-d5728.firebaseapp.com",
databaseURL:"https://i-have-d5728-default-rtdb.firebaseio.com",
projectId:"i-have-d5728",
storageBucket:"i-have-d5728.firebasestorage.app",
messagingSenderId:"1041491068804",
appId:"1:1041491068804:web:21b0d472c5f2929d04bfd1"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let roomId=null;
let playerId="p"+Math.floor(Math.random()*999999);
let myName="";
let isHost=false;

let myCards=[];
let opponentCards=[];
let currentTarget=null;
let waitingFlip=false;

const animals=["alligator","elephant","snake","lion","dog","cat","horse","monkey"];

const playerGrid=document.getElementById("playerGrid");
const opponentGrid=document.getElementById("opponentGrid");
const chainText=document.getElementById("chainText");
const deck=document.getElementById("deck");

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a}

function generateDeck(){
const shuffled=shuffle([...animals]);
let deck=[];
for(let i=0;i<shuffled.length;i++){
const have=shuffled[i];
const who=shuffled[(i+1)%shuffled.length];
for(let c=0;c<3;c++) deck.push({have,who,id:crypto.randomUUID()});
}
return shuffle(deck)
}

function buildPlayerGrid(){
playerGrid.innerHTML="";
myCards.forEach(card=>{
const div=document.createElement("div");
div.className="playerCard";
div.textContent=card.have;
div.onclick=()=>playCard(card);
playerGrid.appendChild(div);
});
}

function buildOpponentGrid(){
opponentGrid.innerHTML="";
opponentCards.forEach(()=>{
const div=document.createElement("div");
div.className="opponentCard";
opponentGrid.appendChild(div);
});
}

async function playCard(card){
if(waitingFlip) return;
waitingFlip=true;

myCards=myCards.filter(c=>c.id!==card.id);

await update(ref(db,"rooms/"+roomId+"/players/"+playerId),{cards:myCards});
await update(ref(db,"rooms/"+roomId),{chain:card,revealed:false});
}

async function flipDeck(){
if(!waitingFlip) return;
waitingFlip=false;
await update(ref(db,"rooms/"+roomId),{revealed:true});
}

function listenRoom(){
onValue(ref(db,"rooms/"+roomId),snap=>{
const data=snap.val();
if(!data) return;

const ids=Object.keys(data.players||{});
const opponentId=ids.find(id=>id!==playerId);

if(data.players[playerId]?.cards){
myCards=data.players[playerId].cards;
buildPlayerGrid();
}

if(opponentId && data.players[opponentId]?.cards){
opponentCards=data.players[opponentId].cards;
buildOpponentGrid();
}

if(data.chain){
chainText.textContent="I HAVE "+data.chain.have.toUpperCase();
currentTarget=data.chain.who;
}

if(data.revealed){
chainText.textContent="WHO HAS "+currentTarget.toUpperCase();
}
})
}

async function enterGame(){
myName=document.getElementById("nameInput").value||"player";
roomId=new URLSearchParams(location.search).get("room");

if(!roomId){
roomId="room"+Math.floor(Math.random()*999999);
await set(ref(db,"rooms/"+roomId),{state:"waiting",players:{}});
document.getElementById("share").innerHTML="Invite link:<br>"+location.href+"?room="+roomId;
isHost=true;
}

await update(ref(db,"rooms/"+roomId+"/players/"+playerId),{name:myName,cards:[]});
listenRoom();
home.style.display="none";
lobby.style.display="block";
}

async function startGame(){
const deckCards=generateDeck();
const half=deckCards.length/2;
const ids=Object.keys((await new Promise(r=>onValue(ref(db,"rooms/"+roomId+"/players"),s=>r(s.val()),{onlyOnce:true}))));
await update(ref(db,"rooms/"+roomId+"/players/"+ids[0]),{cards:deckCards.slice(0,half)});
await update(ref(db,"rooms/"+roomId+"/players/"+ids[1]),{cards:deckCards.slice(half)});
await update(ref(db,"rooms/"+roomId),{state:"playing",chain:null,revealed:false});
document.getElementById("lobby").style.display="none";
document.getElementById("game").style.display="block";
}

document.getElementById("enterBtn").onclick=enterGame;
document.getElementById("startGameBtn").onclick=startGame;
deck.onclick=flipDeck;
</script>
</body>
</html>
